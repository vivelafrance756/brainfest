<style>
:root { --indigo-dark: #2d3d4a; --indigo-mid: #1a2535; --amber: #d4923a; --cream: #f7f3ec; --sage: #6b9e78; --blue: #2a7fa8; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { min-width: 375px; overflow-x: hidden; }
body { font-family: 'DM Sans', sans-serif; background: #f5ede8; color: var(--indigo-dark); min-width: 375px; min-height: 100vh; }
#quiz-header { background: #f5ede8; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.06); }
#back-arrow { background: none; border: none; color: var(--amber); font-size: 20px; cursor: pointer; min-height: 44px; min-width: 44px; display: flex; align-items: center; padding: 0; }
#score-display { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--indigo-dark); display: flex; align-items: center; gap: 6px; }
#q-counter { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--blue); font-weight: 500; }
#progress-track { width: 100%; height: 4px; background: #e0e0e0; }
#progress-fill { height: 4px; background: var(--blue); transition: width 0.4s ease; }
#quiz-main { padding: 16px 20px 32px; max-width: 520px; margin: 0 auto; }
#question-card { background: #ffffff; border-radius: 16px; padding: 24px 20px; margin-bottom: 12px; }
#question-text { font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--indigo-dark); font-weight: 500; line-height: 1.5; margin-bottom: 20px; }
.option-btn { width: 100%; background: #f5ede8; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; min-height: 44px; }
.option-btn:last-child { margin-bottom: 0; }
.option-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; background: #ffffff; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--indigo-dark); flex-shrink: 0; transition: background 0.15s, border-color 0.15s, color 0.15s; }
.option-text { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--indigo-dark); flex: 1; }
.option-check { font-size: 16px; color: var(--blue); display: none; }
.option-btn.selected { border-color: var(--blue); background: #eaf4f8; }
.option-btn.selected .option-letter { border-color: var(--blue); color: var(--blue); }
.option-btn.correct { border-color: var(--blue); background: #e8f4f0; }
.option-btn.correct .option-letter { background: var(--blue); border-color: var(--blue); color: #fff; }
.option-btn.correct .option-check { display: block; }
.option-btn.wrong { border-color: #e74c3c; background: #fdecea; }
.option-btn.wrong .option-letter { background: #e74c3c; border-color: #e74c3c; color: #fff; }
#validate-btn { width: 100%; background: var(--blue); color: #ffffff; border: none; border-radius: 12px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; min-height: 44px; margin-bottom: 12px; transition: background 0.2s; }
#validate-btn:disabled { background: #b0c8d8; cursor: not-allowed; }
#feedback-block { background: #e8f4f0; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: none; }
#feedback-top { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
#feedback-text { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--indigo-dark); line-height: 1.6; }
#reformulation-block { background: #fff8e8; border-radius: 12px; padding: 16px; margin-top: 12px; border: 1px solid rgba(212,146,58,0.3); display: none; }
#reformulation-title { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--amber); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
#reformulation-text { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--indigo-dark); line-height: 1.5; margin-bottom: 16px; }
#reformulation-options { display: flex; gap: 4%; }
.refo-btn { width: 48%; display: inline-flex; justify-content: center; align-items: center; padding: 12px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; border: 1px solid #ccc; background: #ffffff; cursor: pointer; min-height: 44px; transition: background 0.2s, border-color 0.2s, color 0.2s; gap: 6px; }
.refo-btn.refo-correct { background: #e8f4f0; border-color: var(--blue); color: var(--blue); }
.refo-btn.refo-wrong { background: #fdecea; border-color: #e74c3c; color: #e74c3c; }
#reformulation-explanation { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #555; line-height: 1.6; margin-top: 12px; display: none; }
#ask-row { display: none; margin-bottom: 12px; }
#ask-btn { width: 100%; background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; cursor: pointer; text-align: left; min-height: 44px; }
#ask-input-row { display: none; margin-top: 8px; flex-direction: row; gap: 8px; }
#ask-input { flex: 1; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; min-height: 44px; }
#ask-send { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; min-height: 44px; }
#ask-reply { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; margin-top: 6px; display: none; font-style: italic; }
#pubmed-block { background: #ffffff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: none; }
#pubmed-block .pubmed-title { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
#pubmed-block a { display: block; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--blue); text-decoration: none; line-height: 1.5; margin-bottom: 6px; }
#pubmed-block a:hover { text-decoration: underline; }
#continuer-btn { width: 100%; background: var(--blue); color: #ffffff; border: none; border-radius: 12px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; min-height: 44px; display: none; margin-bottom: 12px; }
#lang-toggle { background: transparent; border: 1.5px solid var(--amber); color: var(--amber); font-family: 'DM Sans', sans-serif; font-size: 13px; border-radius: 50px; padding: 4px 12px; cursor: pointer; min-height: 36px; }
</style>
</head>
<body>

<div id="quiz-header">
  <button id="back-arrow" onclick="window.location.href='plantes.html'" aria-label="Retour">←</button>
  <div id="score-display">🧠 <span id="score-text">Score : 0/6</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="q-counter">1/6</span>
    <button id="lang-toggle" onclick="toggleLang()">FR</button>
  </div>
</div>

<div id="progress-track"><div id="progress-fill" style="width:16.6%"></div></div>

<div id="quiz-main">
  <div id="question-card">
    <div id="question-text"></div>
    <div id="options-list"></div>
  </div>
  <button id="validate-btn" disabled onclick="validate()">Valider</button>
  <div id="feedback-block">
    <div id="feedback-top"></div>
    <div id="feedback-text"></div>
    <div id="reformulation-block">
      <div id="reformulation-title"></div>
      <div id="reformulation-text"></div>
      <div id="reformulation-options"></div>
      <div id="reformulation-explanation"></div>
    </div>
  </div>
  <div id="ask-row">
    <button id="ask-btn" onclick="toggleAsk()"><span id="ask-btn-text">💬 Poser une question (3 questions restantes)</span></button>
    <div id="ask-input-row" style="display:none;flex-direction:row;gap:8px;margin-top:8px;">
      <input id="ask-input" type="text" placeholder="Votre question...">
      <button id="ask-send" onclick="sendAsk()">→</button>
    </div>
    <div id="ask-reply"></div>
  </div>
  <div id="pubmed-block">
    <div class="pubmed-title">Sources scientifiques</div>
    <a href="https://pubmed.ncbi.nlm.nih.gov/38442149/" target="_blank" rel="noopener">Pharmacognosy natural products drug discovery</a>
    <a href="https://pubmed.ncbi.nlm.nih.gov/33167080/" target="_blank" rel="noopener">Polyphenols microbiome bioactive metabolites</a>
    <a href="https://pubmed.ncbi.nlm.nih.gov/25734562/" target="_blank" rel="noopener">Berberine antimicrobial resistance</a>
  </div>
  <button id="continuer-btn" onclick="continuer()">Continuer</button>
</div>

<script>
if (!sessionStorage.getItem('bf_access')) { window.location.href = 'index.html'; }

var lang = 'fr';

var questions = [
{
  question_fr: "La pharmacognosie moderne permet de :",
  question_en: "Modern pharmacognosy allows :",
  options: [
    {letter:"A", text_fr:"Remplacer tous les médicaments par des plantes", text_en:"Replacing all medications with plants"},
    {letter:"B", text_fr:"Identifier et standardiser les principes actifs des plantes pour développer des médicaments ou des compléments à efficacité reproductible", text_en:"Identifying and standardising active principles from plants to develop medications or supplements with reproducible effectiveness"},
    {letter:"C", text_fr:"Prouver que toutes les plantes sont efficaces", text_en:"Proving that all plants are effective"},
    {letter:"D", text_fr:"Éliminer le besoin d'études cliniques", text_en:"Eliminating the need for clinical studies"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. La pharmacognosie est la science qui étudie les substances d'origine naturelle à visée thérapeutique. Elle permet d'identifier les principes actifs (ex : artémisinine du qinghaosu, paclitaxel de l'if, quinine du quinquina), de les standardiser et de les produire en quantité reproductible. Environ 25% des médicaments modernes sont dérivés de plantes.",
  feedback_ok_en: "Exactly. Pharmacognosy is the science that studies natural substances for therapeutic purposes. It allows identification of active principles (eg: artemisinin from qinghaosu, paclitaxel from yew, quinine from cinchona), standardising them and producing them in reproducible quantities. Approximately 25% of modern medications are derived from plants.",
  feedback_ko_fr: "L'artémisinine (prix Nobel 2015), le paclitaxel (cancer), la morphine (pavot) et la digoxine (digitale) sont tous des médicaments modernes dérivés de plantes. La pharmacognosie est le pont entre la phytothérapie traditionnelle et la pharmacologie moderne.",
  feedback_ko_en: "Artemisinin (Nobel Prize 2015), paclitaxel (cancer), morphine (poppy) and digoxin (foxglove) are all modern medications derived from plants. Pharmacognosy is the bridge between traditional herbal medicine and modern pharmacology.",
  reformulation_fr: "Des médicaments modernes importants sont-ils dérivés de plantes ?",
  reformulation_en: "Are important modern medications derived from plants ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Environ 25% des médicaments modernes sont dérivés de plantes. L'artémisinine (paludisme), le paclitaxel (cancer), la morphine (douleur) et la digoxine (insuffisance cardiaque) en sont des exemples emblématiques.",
  reformulation_explanation_en: "Approximately 25% of modern medications are derived from plants. Artemisinin (malaria), paclitaxel (cancer), morphine (pain) and digoxin (heart failure) are emblematic examples."
},
{
  question_fr: "Les polyphénols végétaux exercent leurs effets via :",
  question_en: "Plant polyphenols exert their effects via :",
  options: [
    {letter:"A", text_fr:"Une action directe sans métabolisme", text_en:"Direct action without metabolism"},
    {letter:"B", text_fr:"Leur métabolisation par le microbiote intestinal en métabolites bioactifs, leur modulation épigénétique et leur interaction avec les voies NF-kB, Nrf2 et SIRT1", text_en:"Their metabolisation by the gut microbiome into bioactive metabolites, their epigenetic modulation and their interaction with NF-kB, Nrf2 and SIRT1 pathways"},
    {letter:"C", text_fr:"Uniquement via leur action antioxydante directe", text_en:"Only via their direct antioxidant action"},
    {letter:"D", text_fr:"Aucun mécanisme d'action identifié", text_en:"No identified mechanism of action"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. La compréhension des polyphénols a radicalement évolué. Leur biodisponibilité orale est faible mais le microbiote intestinal les transforme en métabolites bioactifs (urolithines, équol, acide protocatéchique). Ces métabolites modulent NF-kB (anti-inflammatoire), activent Nrf2 (antioxydant) et SIRT1 (anti-âge). L'efficacité des polyphénols dépend donc aussi de la composition du microbiote.",
  feedback_ok_en: "Exactly. Understanding of polyphenols has radically evolved. Their oral bioavailability is low but the gut microbiome transforms them into bioactive metabolites (urolithins, equol, protocatechuic acid). These metabolites modulate NF-kB (anti-inflammatory), activate Nrf2 (antioxidant) and SIRT1 (anti-ageing). The effectiveness of polyphenols therefore also depends on microbiome composition.",
  feedback_ko_fr: "Tous les humains ne métabolisent pas les polyphénols de la même façon. Par exemple, seuls 30 à 40% des personnes possèdent les bactéries intestinales capables de convertir les isoflavones du soja en équol, le métabolite actif. C'est l'individualisation de la nutrition.",
  feedback_ko_en: "Not all humans metabolise polyphenols the same way. For example, only 30 to 40% of people have the gut bacteria capable of converting soy isoflavones into equol, the active metabolite. This is the individualisation of nutrition.",
  reformulation_fr: "Le microbiote intestinal influence-t-il l'efficacité des polyphénols végétaux ?",
  reformulation_en: "Does the gut microbiome influence the effectiveness of plant polyphenols ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Le microbiote transforme les polyphénols en métabolites bioactifs. Sans les bonnes bactéries, certains polyphénols restent inactifs. C'est pourquoi deux personnes avec la même alimentation peuvent avoir des bénéfices très différents.",
  reformulation_explanation_en: "The microbiome transforms polyphenols into bioactive metabolites. Without the right bacteria, some polyphenols remain inactive. This is why two people with the same diet can have very different benefits."
},
{
  question_fr: "La résistance aux antibiotiques ouvre-t-elle des perspectives pour les plantes antimicrobiennes ?",
  question_en: "Does antibiotic resistance open perspectives for antimicrobial plants ?",
  options: [
    {letter:"A", text_fr:"Non, les plantes ne peuvent pas combattre les bactéries résistantes", text_en:"No, plants cannot fight resistant bacteria"},
    {letter:"B", text_fr:"Oui, des composés comme la berbérine, le thymol et l'acide rosmarinique montrent une activité contre certaines bactéries résistantes et peuvent potentialiser les antibiotiques", text_en:"Yes, compounds like berberine, thymol and rosmarinic acid show activity against certain resistant bacteria and can potentiate antibiotics"},
    {letter:"C", text_fr:"Oui, les plantes peuvent complètement remplacer les antibiotiques", text_en:"Yes, plants can completely replace antibiotics"},
    {letter:"D", text_fr:"Non, aucune recherche sérieuse dans ce domaine", text_en:"No, no serious research in this field"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. La résistance aux antibiotiques est l'une des crises sanitaires majeures du 21e siècle. Des composés végétaux comme la berbérine (épine-vinette), le thymol (thym), l'acide rosmarinique (romarin) et la quercétine montrent une activité contre des SARM et d'autres bactéries multirésistantes. Ils peuvent aussi réduire la formation de biofilms bactériens. C'est une piste de recherche sérieuse mais pas un remplacement des antibiotiques.",
  feedback_ok_en: "Exactly. Antibiotic resistance is one of the major health crises of the 21st century. Plant compounds like berberine (barberry), thymol (thyme), rosmarinic acid (rosemary) and quercetin show activity against MRSA and other multiresistant bacteria. They can also reduce bacterial biofilm formation. This is a serious research avenue but not a replacement for antibiotics.",
  feedback_ko_fr: "La berbérine est l'un des composés végétaux les plus étudiés pour ses propriétés antimicrobiennes. Elle inhibe aussi la FtsZ (protéine de division bactérienne), un mécanisme d'action distinct des antibiotiques classiques.",
  feedback_ko_en: "Berberine is one of the most studied plant compounds for its antimicrobial properties. It also inhibits FtsZ (bacterial division protein), a mechanism of action distinct from classic antibiotics.",
  reformulation_fr: "La berbérine végétale a-t-elle une activité contre les bactéries résistantes aux antibiotiques ?",
  reformulation_en: "Does plant berberine have activity against antibiotic-resistant bacteria ?",
  reformulation_answer: "Oui selon les données disponibles / Yes according to available data",
  reformulation_explanation_fr: "Des études in vitro et quelques études cliniques montrent une activité de la berbérine contre le SARM et d'autres bactéries multirésistantes. Des essais cliniques de grande taille sont encore nécessaires.",
  reformulation_explanation_en: "In vitro studies and some clinical studies show activity of berberine against MRSA and other multiresistant bacteria. Large clinical trials are still needed."
},
{
  question_fr: "PIÈGE : La phytothérapie traditionnelle est-elle validée par son ancienneté ?",
  question_en: "TRAP : Is traditional herbal medicine validated by its antiquity ?",
  options: [
    {letter:"A", text_fr:"Oui, des siècles d'usage prouvent l'efficacité", text_en:"Yes, centuries of use prove effectiveness"},
    {letter:"B", text_fr:"Non, l'usage traditionnel est une piste de recherche mais pas une preuve d'efficacité. De nombreuses pratiques traditionnelles ont été infirmées par les études cliniques", text_en:"No, traditional use is a research lead but not proof of effectiveness. Many traditional practices have been disproved by clinical studies"},
    {letter:"C", text_fr:"Oui, la tradition est plus fiable que la science", text_en:"Yes, tradition is more reliable than science"},
    {letter:"D", text_fr:"Non, toutes les traditions médicales sont fausses", text_en:"No, all medical traditions are false"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. L'usage traditionnel est une source précieuse d'hypothèses de recherche. Mais la validation scientifique reste indispensable. L'échinacée pour les infections respiratoires, la glucosamine pour l'arthrose et le ginkgo pour la mémoire ont été utilisés traditionnellement pendant des siècles avant que des méta-analyses rigoureuses montrent des résultats décevants ou contradictoires.",
  feedback_ok_en: "Exactly. Traditional use is a precious source of research hypotheses. But scientific validation remains essential. Echinacea for respiratory infections, glucosamine for osteoarthritis and ginkgo for memory were traditionally used for centuries before rigorous meta-analyses showed disappointing or contradictory results.",
  feedback_ko_fr: "L'arsenic, le mercure et la saignée ont été utilisés pendant des siècles en médecine traditionnelle. L'ancienneté d'une pratique ne garantit pas son efficacité ni son innocuité. La méthode scientifique reste le seul moyen de distinguer remède de légende.",
  feedback_ko_en: "Arsenic, mercury and bloodletting were used for centuries in traditional medicine. The antiquity of a practice does not guarantee its effectiveness or safety. The scientific method remains the only way to distinguish remedy from legend.",
  reformulation_fr: "Le ginkgo biloba est-il prouvé scientifiquement efficace pour améliorer la mémoire ?",
  reformulation_en: "Is ginkgo biloba scientifically proven effective for improving memory ?",
  reformulation_answer: "Non selon les méta-analyses récentes / No according to recent meta-analyses",
  reformulation_explanation_fr: "Malgré un usage traditionnel millénaire et de nombreuses études positives isolées, les méta-analyses les plus rigoureuses ne confirment pas d'effet significatif du ginkgo sur la mémoire ou la démence.",
  reformulation_explanation_en: "Despite millennia of traditional use and many isolated positive studies, the most rigorous meta-analyses do not confirm a significant effect of ginkgo on memory or dementia."
},
{
  question_fr: "La synergie phytochimique explique pourquoi :",
  question_en: "Phytochemical synergy explains why :",
  options: [
    {letter:"A", text_fr:"Les plantes entières sont toujours supérieures aux molécules isolées", text_en:"Whole plants are always superior to isolated molecules"},
    {letter:"B", text_fr:"Dans certains cas, les extraits de plante entière montrent une efficacité supérieure aux molécules isolées grâce aux interactions entre composants, bien que ce ne soit pas universel", text_en:"In certain cases, whole plant extracts show superior effectiveness to isolated molecules thanks to interactions between components, although this is not universal"},
    {letter:"C", text_fr:"Les molécules isolées sont toujours supérieures aux plantes entières", text_en:"Isolated molecules are always superior to whole plants"},
    {letter:"D", text_fr:"La synergie est un concept sans base scientifique", text_en:"Synergy is a concept without scientific basis"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. La synergie phytochimique est réelle dans certains cas documentés. L'exemple le plus connu est l'ail : l'allicine seule est moins efficace que l'extrait total d'ail. L'Echinacea : la combinaison d'alkylamides et de polysaccharides est plus immunostimulante que chaque composé seul. Mais ce n'est pas universel : la morphine isolée du pavot est bien plus puissante que l'opium brut.",
  feedback_ok_en: "Exactly. Phytochemical synergy is real in certain documented cases. The best-known example is garlic: allicin alone is less effective than total garlic extract. Echinacea: the combination of alkylamides and polysaccharides is more immunostimulating than each compound alone. But it is not universal: morphine isolated from poppy is much more powerful than raw opium.",
  feedback_ko_fr: "La synergie phytochimique est parfois invoquée de façon non scientifique pour justifier n'importe quelle préparation à base de plantes. La vérité est nuancée : parfois réelle et documentée, parfois inexistante. Chaque cas mérite une évaluation spécifique.",
  feedback_ko_en: "Phytochemical synergy is sometimes invoked non-scientifically to justify any plant-based preparation. The truth is nuanced: sometimes real and documented, sometimes non-existent. Each case deserves specific evaluation.",
  reformulation_fr: "La synergie phytochimique est-elle prouvée dans tous les cas chez les plantes médicinales ?",
  reformulation_en: "Is phytochemical synergy proven in all cases in medicinal plants ?",
  reformulation_answer: "Non / No",
  reformulation_explanation_fr: "La synergie est documentée dans certains cas (ail, échinacée) mais pas universelle. Dans d'autres cas, la molécule isolée est plus puissante que la plante entière (morphine vs opium).",
  reformulation_explanation_en: "Synergy is documented in certain cases (garlic, echinacea) but not universal. In other cases, the isolated molecule is more powerful than the whole plant (morphine vs opium)."
},
{
  question_fr: "L'ethnobotanique contribue-t-elle à la découverte de nouveaux médicaments ?",
  question_en: "Does ethnobotany contribute to the discovery of new medications ?",
  options: [
    {letter:"A", text_fr:"Non, la médecine moderne n'a pas besoin des savoirs traditionnels", text_en:"No, modern medicine does not need traditional knowledge"},
    {letter:"B", text_fr:"Oui, l'étude des usages traditionnels des plantes a permis de découvrir des médicaments majeurs comme l'artémisinine, la quinine et le paclitaxel", text_en:"Yes, the study of traditional plant uses has led to discovery of major medications like artemisinin, quinine and paclitaxel"},
    {letter:"C", text_fr:"Non, les savoirs traditionnels sont trop imprécis", text_en:"No, traditional knowledge is too imprecise"},
    {letter:"D", text_fr:"Oui, mais uniquement dans les pays en développement", text_en:"Yes, but only in developing countries"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. L'ethnobotanique a guidé certaines des découvertes pharmaceutiques les plus importantes. L'artémisinine a été découverte en étudiant la médecine traditionnelle chinoise (Qinghao/Artemisia annua). La quinine vient de l'usage traditionnel du quinquina par les peuples andins. Le paclitaxel de l'usage des Amérindiens de l'if de l'Ouest. Ces exemples illustrent la valeur des savoirs traditionnels comme hypothèses de recherche.",
  feedback_ok_en: "Exactly. Ethnobotany has guided some of the most important pharmaceutical discoveries. Artemisinin was discovered by studying traditional Chinese medicine (Qinghao/Artemisia annua). Quinine comes from traditional use of cinchona by Andean peoples. Paclitaxel from Native American use of the Pacific yew. These examples illustrate the value of traditional knowledge as research hypotheses.",
  feedback_ko_fr: "Tu Youyou, la chercheuse chinoise qui a découvert l'artémisinine en étudiant les textes de médecine traditionnelle chinoise, a reçu le prix Nobel de Médecine en 2015. C'est l'illustration la plus éloquente de la valeur de l'ethnobotanique.",
  feedback_ko_en: "Tu Youyou, the Chinese researcher who discovered artemisinin by studying traditional Chinese medicine texts, received the Nobel Prize in Medicine in 2015. It is the most eloquent illustration of the value of ethnobotany.",
  reformulation_fr: "L'artémisinine antipaludéenne a-t-elle été découverte grâce à la médecine traditionnelle chinoise ?",
  reformulation_en: "Was antimalarial artemisinin discovered thanks to traditional Chinese medicine ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Tu Youyou a découvert l'artémisinine en étudiant les textes anciens de médecine chinoise décrivant l'usage d'Artemisia annua contre les fièvres. Cette découverte lui a valu le prix Nobel 2015.",
  reformulation_explanation_en: "Tu Youyou discovered artemisinin by studying ancient Chinese medicine texts describing the use of Artemisia annua against fevers. This discovery earned her the 2015 Nobel Prize."
}
];

var currentIndex = 0, score = 0, selectedLetter = null, validated = false, reformulationAnswered = false, questionsLeft = 3;

renderQuestion();

function renderQuestion() {
  var q = questions[currentIndex];
  selectedLetter = null; validated = false; reformulationAnswered = false;
  document.getElementById('question-text').textContent = q['question_' + lang];
  var list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-letter', opt.letter);
    btn.onclick = function() { selectOption(opt.letter); };
    btn.innerHTML = '<span class="option-letter">' + opt.letter + '</span><span class="option-text">' + opt['text_' + lang] + '</span><span class="option-check">✓</span>';
    list.appendChild(btn);
  });
  var vb = document.getElementById('validate-btn');
  vb.disabled = true; vb.style.display = 'block';
  vb.textContent = lang === 'fr' ? 'Valider' : 'Validate';
  document.getElementById('feedback-block').style.display = 'none';
  document.getElementById('reformulation-block').style.display = 'none';
  document.getElementById('reformulation-title').textContent = '';
  document.getElementById('reformulation-options').innerHTML = '';
  document.getElementById('ask-row').style.display = 'none';
  document.getElementById('ask-input-row').style.display = 'none';
  document.getElementById('ask-reply').textContent = ''; document.getElementById('ask-reply').style.display = 'none';
  document.getElementById('continuer-btn').style.display = 'none';
  document.getElementById('pubmed-block').style.display = 'none';
  updateHeader();
}

function selectOption(letter) {
  if (validated) return;
  selectedLetter = letter;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    btn.classList.remove('selected');
    if (btn.getAttribute('data-letter') === letter) btn.classList.add('selected');
  });
  document.getElementById('validate-btn').disabled = false;
}

function validate() {
  if (!selectedLetter || validated) return;
  validated = true;
  var q = questions[currentIndex];
  var isCorrect = selectedLetter === q.correct;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    var letter = btn.getAttribute('data-letter');
    btn.onclick = null;
    if (letter === q.correct) { btn.classList.remove('selected'); btn.classList.add('correct'); }
    else if (letter === selectedLetter && !isCorrect) { btn.classList.remove('selected'); btn.classList.add('wrong'); }
  });
  document.getElementById('validate-btn').style.display = 'none';
  var fb = document.getElementById('feedback-block');
  fb.style.display = 'block';
  if (isCorrect) {
    score++;
    fb.style.background = '#e8f4f0';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#2a7fa8">✓</span> <span style="color:#2a7fa8">' + (lang === 'fr' ? 'Bonne réponse !' : 'Correct!') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ok_' + lang];
    showPostFeedback();
  } else {
    fb.style.background = '#fdecea';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#e74c3c">✗</span> <span style="color:#e74c3c">' + (lang === 'fr' ? 'Pas tout à fait...' : 'Not quite...') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ko_' + lang];
    showReformulation();
  }
  updateHeader();
}

function showReformulation() {
  var q = questions[currentIndex];
  document.getElementById('reformulation-block').style.display = 'block';
  document.getElementById('reformulation-title').innerHTML = '🔄 ' + (lang === 'fr' ? 'Essayons autrement...' : 'Let\'s try another way...');
  document.getElementById('reformulation-text').textContent = q['reformulation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'none';
  var opts = document.getElementById('reformulation-options');
  opts.innerHTML = '';
  var refoCorrectIsOui = q.reformulation_answer.toLowerCase().indexOf('oui') === 0;
  var choices = [
    { text_fr: 'Oui', text_en: 'Yes', correct: refoCorrectIsOui },
    { text_fr: 'Non', text_en: 'No', correct: !refoCorrectIsOui }
  ];
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'refo-btn';
    btn.textContent = c['text_' + lang];
    btn.setAttribute('data-correct', c.correct ? '1' : '0');
    btn.onclick = function() { answerReformulation(c.correct, btn, opts.querySelectorAll('.refo-btn')); };
    opts.appendChild(btn);
  });
}

function answerReformulation(isCorrect, clickedBtn, allBtns) {
  if (reformulationAnswered) { if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); } return; }
  if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); return; }
  reformulationAnswered = true;
  allBtns.forEach(function(btn) {
    btn.onclick = null;
    if (btn.getAttribute('data-correct') === '1') { btn.classList.add('refo-correct'); btn.innerHTML += ' ✓'; }
  });
  var q = questions[currentIndex];
  document.getElementById('reformulation-explanation').textContent = q['reformulation_explanation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'block';
  setTimeout(function() { showPostFeedback(); }, 1000);
}

function showPostFeedback() {
  document.getElementById('ask-row').style.display = 'block';
  if (questionsLeft > 0) { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  else { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  if (currentIndex === questions.length - 1) document.getElementById('pubmed-block').style.display = 'block';
  document.getElementById('continuer-btn').style.display = 'block';
  document.getElementById('continuer-btn').textContent = lang === 'fr' ? 'Continuer' : 'Continue';
}

function continuer() {
  if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else { sessionStorage.setItem('bf_score_pl4', score); window.location.href = 'plantes-niveau4-fin.html'; }
}

function updateHeader() {
  document.getElementById('score-text').textContent = (lang === 'fr' ? 'Score : ' : 'Score: ') + score + '/6';
  document.getElementById('q-counter').textContent = (currentIndex + 1) + '/6';
  document.getElementById('progress-fill').style.width = (((currentIndex) / questions.length * 100) + (100 / questions.length)) + '%';
}

function updateAskBtn() {
  document.getElementById('ask-btn-text').textContent = lang === 'fr'
    ? '💬 Poser une question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's restantes' : ' restante') + ')'
    : '💬 Ask a question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's' : '') + ' remaining)';
}

function toggleAsk() {
  var row = document.getElementById('ask-input-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

async function sendAsk() {
  if (questionsLeft <= 0) return;
  var input = document.getElementById('ask-input');
  var reply = document.getElementById('ask-reply');
  var question = input.value.trim();
  if (!question) return;
  questionsLeft--;
  input.value = '';
  document.getElementById('ask-input-row').style.display = 'none';
  if (questionsLeft === 0) { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  else { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  reply.textContent = lang === 'fr' ? 'Recherche en cours...' : 'Searching...';
  reply.style.display = 'block';
  try {
    var response = await fetch('https://brainfest-ai.c-piault.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        topic: lang === 'fr' ? 'les plantes médicinales et leurs effets sur la peau' : 'medicinal plants and their effects on the skin',
        language: lang
      })
    });
    var data = await response.json();
    reply.textContent = data.answer || (lang === 'fr' ? 'Désolé, je ne peux pas répondre.' : 'Sorry, I cannot answer.');
  } catch (error) {
    reply.textContent = lang === 'fr' ? 'Erreur de connexion. Réessayez.' : 'Connection error. Please try again.';
  }
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('lang-toggle').textContent = lang === 'fr' ? 'FR' : 'EN';
  renderQuestion(); updateHeader();
}
</script>

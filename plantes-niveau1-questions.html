<style>

#continuer-btn { width: 100%; background: var(--blue); color: #ffffff; border: none; border-radius: 12px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; min-height: 44px; display: none; margin-bottom: 12px; }
#lang-toggle { background: transparent; border: 1.5px solid var(--amber); color: var(--amber); font-family: 'DM Sans', sans-serif; font-size: 13px; border-radius: 50px; padding: 4px 12px; cursor: pointer; min-height: 36px; }

var questions = [
{
  question_fr: "Le gel d'aloe vera a-t-il des effets prouvés sur la peau ?",
  question_en: "Does aloe vera gel have proven effects on the skin ?",
  options: [
    {letter:"A", text_fr:"Non, c'est uniquement marketing", text_en:"No, it is purely marketing"},
    {letter:"B", text_fr:"Oui, des études cliniques confirment ses effets cicatrisants, hydratants et anti-inflammatoires via les polysaccharides et l'acemannane", text_en:"Yes, clinical studies confirm its healing, moisturising and anti-inflammatory effects via polysaccharides and acemannan"},
    {letter:"C", text_fr:"Oui, mais uniquement sur les brûlures graves", text_en:"Yes, but only on serious burns"},
    {letter:"D", text_fr:"Non, il irrite toujours la peau", text_en:"No, it always irritates the skin"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. L'aloe vera contient de l'acemannane, un polysaccharide qui stimule la cicatrisation, active les macrophages et réduit l'inflammation via l'inhibition de NF-kB. Des essais cliniques confirment son efficacité sur les brûlures légères, la dermatite séborrhéique et les ulcères de pression. Sa concentration active doit être supérieure à 10%.",
  feedback_ok_en: "Exactly. Aloe vera contains acemannan, a polysaccharide that stimulates healing, activates macrophages and reduces inflammation via NF-kB inhibition. Clinical trials confirm its effectiveness on minor burns, seborrhoeic dermatitis and pressure ulcers. Its active concentration must be above 10%.",
  feedback_ko_fr: "L'aloe vera fait partie des plantes les mieux documentées en dermatologie. Ses effets ne sont pas du marketing mais reposent sur des mécanismes moléculaires identifiés et des études cliniques sérieuses.",
  feedback_ko_en: "Aloe vera is one of the best-documented plants in dermatology. Its effects are not marketing but are based on identified molecular mechanisms and serious clinical studies.",
  reformulation_fr: "L'aloe vera réduit-il l'inflammation cutanée ?",
  reformulation_en: "Does aloe vera reduce skin inflammation ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "L'acemannane de l'aloe vera inhibe NF-kB et réduit la production de cytokines pro-inflammatoires dans les kératinocytes et les fibroblastes.",
  reformulation_explanation_en: "Acemannan from aloe vera inhibits NF-kB and reduces production of pro-inflammatory cytokines in keratinocytes and fibroblasts."
},
{
  question_fr: "L'huile essentielle de tea tree (arbre à thé) est-elle efficace contre l'acné ?",
  question_en: "Is tea tree essential oil effective against acne ?",
  options: [
    {letter:"A", text_fr:"Non, aucune preuve scientifique", text_en:"No, no scientific evidence"},
    {letter:"B", text_fr:"Oui, le terpinène-4-ol inhibe Cutibacterium acnes et réduit l'inflammation, mais elle est aussi un allergène de contact fréquent", text_en:"Yes, terpinen-4-ol inhibits Cutibacterium acnes and reduces inflammation, but it is also a frequent contact allergen"},
    {letter:"C", text_fr:"Oui, elle est sans aucun effet indésirable", text_en:"Yes, it has no adverse effects"},
    {letter:"D", text_fr:"Non, elle aggrave systématiquement l'acné", text_en:"No, it systematically worsens acne"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. Le terpinène-4-ol du tea tree inhibe C. acnes et a des propriétés anti-inflammatoires documentées. Un essai clinique de référence (Bassett 1990) a montré une efficacité comparable au peroxyde de benzoyle 5% mais avec moins d'effets secondaires immédiats. Cependant, le tea tree est l'un des allergènes de contact les plus fréquents en dermatologie. Ne jamais l'utiliser pur.",
  feedback_ok_en: "Exactly. Terpinen-4-ol from tea tree inhibits C. acnes and has documented anti-inflammatory properties. A reference clinical trial (Bassett 1990) showed comparable effectiveness to 5% benzoyl peroxide but with fewer immediate side effects. However, tea tree is one of the most frequent contact allergens in dermatology. Never use it undiluted.",
  feedback_ko_fr: "Le tea tree illustre parfaitement le principe : efficace mais pas sans risque. Son oxydation à l'air amplifie son potentiel allergisant. Un flacon ouvert depuis plus de 6 mois doit être jeté.",
  feedback_ko_en: "Tea tree perfectly illustrates the principle: effective but not risk-free. Its oxidation in air amplifies its allergenic potential. A bottle open for more than 6 months should be discarded.",

  reformulation_en: "Can tea tree essential oil cause skin allergies ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Le tea tree est l'un des allergènes de contact les plus fréquents en dermatologie. Il ne doit jamais être utilisé pur et doit être dilué à 5% maximum dans une huile végétale.",
  reformulation_explanation_en: "Tea tree is one of the most frequent contact allergens in dermatology. It should never be used undiluted and must be diluted to 5% maximum in a carrier oil."
},
{
  question_fr: "La camomille allemande (Matricaria chamomilla) est utilisée pour la peau parce que :",
  question_en: "German chamomile (Matricaria chamomilla) is used for skin because :",
  options: [
    {letter:"A", text_fr:"Elle est uniquement apaisante par son odeur", text_en:"It is only soothing through its scent"},
    {letter:"B", text_fr:"L'alpha-bisabolol et l'apigénine inhibent NF-kB et COX-2, réduisant l'inflammation et accélérant la cicatrisation", text_en:"Alpha-bisabolol and apigenin inhibit NF-kB and COX-2, reducing inflammation and accelerating healing"},
    {letter:"C", text_fr:"Elle produit du collagène directement", text_en:"It directly produces collagen"},
    {letter:"D", text_fr:"Aucune preuve scientifique de ses effets cutanés", text_en:"No scientific evidence of its skin effects"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. L'alpha-bisabolol de la camomille inhibe NF-kB et COX-2. L'apigénine (flavonoïde) a des propriétés antioxydantes et anti-inflammatoires documentées. Le chamazulène (responsable de la couleur bleue de l'huile essentielle) est un anti-inflammatoire puissant. La camomille est l'une des plantes les mieux documentées pour les peaux sensibles et l'eczéma léger.",
  feedback_ok_en: "Exactly. Alpha-bisabolol from chamomile inhibits NF-kB and COX-2. Apigenin (flavonoid) has documented antioxidant and anti-inflammatory properties. Chamazulene (responsible for the blue colour of the essential oil) is a powerful anti-inflammatory. Chamomile is one of the best-documented plants for sensitive skin and mild eczema.",
  feedback_ko_fr: "La camomille allemande et la camomille romaine (Chamaemelum nobile) sont deux plantes différentes avec des compositions chimiques distinctes. La camomille allemande est plus riche en chamazulène et alpha-bisabolol, la rendant plus anti-inflammatoire.",
  feedback_ko_en: "German chamomile and Roman chamomile (Chamaemelum nobile) are two different plants with distinct chemical compositions. German chamomile is richer in chamazulene and alpha-bisabolol, making it more anti-inflammatory.",
  reformulation_fr: "La camomille allemande est-elle validée scientifiquement pour les peaux sensibles ?",
  reformulation_en: "Is German chamomile scientifically validated for sensitive skin ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "L'alpha-bisabolol et le chamazulène de la camomille allemande ont des effets anti-inflammatoires documentés dans plusieurs études cliniques pour les peaux sensibles et l'eczéma léger.",
  reformulation_explanation_en: "Alpha-bisabolol and chamazulene from German chamomile have documented anti-inflammatory effects in several clinical studies for sensitive skin and mild eczema."
},
{
  question_fr: "PIÈGE : Les plantes médicinales sont-elles sans danger car naturelles ?",
  question_en: "TRAP : Are medicinal plants safe because they are natural ?",
  options: [
    {letter:"A", text_fr:"Oui, le naturel garantit la sécurité", text_en:"Yes, natural guarantees safety"},
    {letter:"B", text_fr:"Non, de nombreuses plantes contiennent des molécules toxiques, allergènes ou interagissent avec des médicaments", text_en:"No, many plants contain toxic molecules, allergens or interact with medications"},
    {letter:"C", text_fr:"Oui, les plantes ne peuvent jamais nuire", text_en:"Yes, plants can never be harmful"},
    {letter:"D", text_fr:"Non, toutes les plantes sont dangereuses", text_en:"No, all plants are dangerous"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. Le naturel ne signifie pas inoffensif. L'aconit, la belladone et la digitale sont des plantes mortelles. Le millepertuis interagit avec les contraceptifs et les anticoagulants. La consoude contient des alcaloïdes pyrrolizidiniques hépatotoxiques. La réglisse en excès provoque une hypertension. Toute plante médicinale doit être utilisée avec discernement.",
  feedback_ok_en: "Exactly. Natural does not mean harmless. Aconite, belladonna and digitalis are deadly plants. St John's wort interacts with contraceptives and anticoagulants. Comfrey contains hepatotoxic pyrrolizidine alkaloids. Excess liquorice causes hypertension. Every medicinal plant must be used with discernement.",
  feedback_ko_fr: "C'est le mythe le plus dangereux en phytothérapie. La toxicité dépend de la dose, de la durée d'utilisation, des interactions médicamenteuses et du terrain de la personne. Consulter un professionnel de santé avant toute phytothérapie.",
  feedback_ko_en: "This is the most dangerous myth in herbal medicine. Toxicity depends on dose, duration of use, drug interactions and the person's health status. Consult a health professional before any herbal medicine.",

  reformulation_en: "Can St John's wort interact dangerously with medications ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Le millepertuis induit le CYP3A4, accélérant le métabolisme de nombreux médicaments dont les contraceptifs oraux, les anticoagulants et les antirétroviraux, réduisant leur efficacité.",

{

  options: [

    {letter:"D", text_fr:"Non, aucune étude sérieuse", text_en:"No, no serious study"}

  reformulation_answer: "Oui / Yes",

}
];

var currentIndex = 0, score = 0, selectedLetter = null, validated = false, reformulationAnswered = false, questionsLeft = 3;

renderQuestion();

function renderQuestion() {
  var q = questions[currentIndex];
  selectedLetter = null; validated = false; reformulationAnswered = false;
  document.getElementById('question-text').textContent = q['question_' + lang];
  var list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-letter', opt.letter);
    btn.onclick = function() { selectOption(opt.letter); };
    btn.innerHTML = '<span class="option-letter">' + opt.letter + '</span><span class="option-text">' + opt['text_' + lang] + '</span><span class="option-check">✓</span>';
    list.appendChild(btn);
  });
  var vb = document.getElementById('validate-btn');
  vb.disabled = true; vb.style.display = 'block';
  vb.textContent = lang === 'fr' ? 'Valider' : 'Validate';
  document.getElementById('feedback-block').style.display = 'none';
  document.getElementById('reformulation-block').style.display = 'none';
  document.getElementById('reformulation-title').textContent = '';
  document.getElementById('reformulation-options').innerHTML = '';
  document.getElementById('ask-row').style.display = 'none';
  document.getElementById('ask-input-row').style.display = 'none';
  document.getElementById('ask-reply').textContent = ''; document.getElementById('ask-reply').style.display = 'none';
  document.getElementById('continuer-btn').style.display = 'none';
  document.getElementById('pubmed-block').style.display = 'none';
  updateHeader();
}

function selectOption(letter) {
  if (validated) return;
  selectedLetter = letter;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    btn.classList.remove('selected');
    if (btn.getAttribute('data-letter') === letter) btn.classList.add('selected');
  });
  document.getElementById('validate-btn').disabled = false;
}

function validate() {
  if (!selectedLetter || validated) return;
  validated = true;
  var q = questions[currentIndex];
  var isCorrect = selectedLetter === q.correct;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    var letter = btn.getAttribute('data-letter');
    btn.onclick = null;
    if (letter === q.correct) { btn.classList.remove('selected'); btn.classList.add('correct'); }
    else if (letter === selectedLetter && !isCorrect) { btn.classList.remove('selected'); btn.classList.add('wrong'); }
  });
  document.getElementById('validate-btn').style.display = 'none';
  var fb = document.getElementById('feedback-block');
  fb.style.display = 'block';
  if (isCorrect) {
    score++;
    fb.style.background = '#e8f4f0';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#2a7fa8">✓</span> <span style="color:#2a7fa8">' + (lang === 'fr' ? 'Bonne réponse !' : 'Correct!') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ok_' + lang];
    showPostFeedback();
  } else {
    fb.style.background = '#fdecea';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#e74c3c">✗</span> <span style="color:#e74c3c">' + (lang === 'fr' ? 'Pas tout à fait...' : 'Not quite...') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ko_' + lang];
    showReformulation();
  }
  updateHeader();
}

function showReformulation() {
  var q = questions[currentIndex];
  document.getElementById('reformulation-block').style.display = 'block';
  document.getElementById('reformulation-title').innerHTML = '🔄 ' + (lang === 'fr' ? 'Essayons autrement...' : 'Let\'s try another way...');
  document.getElementById('reformulation-text').textContent = q['reformulation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'none';
  var opts = document.getElementById('reformulation-options');
  opts.innerHTML = '';
  var refoCorrectIsOui = q.reformulation_answer.toLowerCase().indexOf('oui') === 0;
  var choices = [
    { text_fr: 'Oui', text_en: 'Yes', correct: refoCorrectIsOui },
    { text_fr: 'Non', text_en: 'No', correct: !refoCorrectIsOui }
  ];
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'refo-btn';
    btn.textContent = c['text_' + lang];
    btn.setAttribute('data-correct', c.correct ? '1' : '0');
    btn.onclick = function() { answerReformulation(c.correct, btn, opts.querySelectorAll('.refo-btn')); };
    opts.appendChild(btn);
  });
}

function answerReformulation(isCorrect, clickedBtn, allBtns) {
  if (reformulationAnswered) { if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); } return; }
  if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); return; }
  reformulationAnswered = true;
  allBtns.forEach(function(btn) {
    btn.onclick = null;
    if (btn.getAttribute('data-correct') === '1') { btn.classList.add('refo-correct'); btn.innerHTML += ' ✓'; }
  });
  var q = questions[currentIndex];
  document.getElementById('reformulation-explanation').textContent = q['reformulation_explanation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'block';
  setTimeout(function() { showPostFeedback(); }, 1000);
}

function showPostFeedback() {
  document.getElementById('ask-row').style.display = 'block';
  if (questionsLeft > 0) { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  else { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  if (currentIndex === questions.length - 1) document.getElementById('pubmed-block').style.display = 'block';
  document.getElementById('continuer-btn').style.display = 'block';
  document.getElementById('continuer-btn').textContent = lang === 'fr' ? 'Continuer' : 'Continue';
}

function continuer() {
  if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else { sessionStorage.setItem('bf_score_pl1', score); window.location.href = 'plantes-niveau1-fin.html'; }
}

function updateHeader() {
  document.getElementById('score-text').textContent = (lang === 'fr' ? 'Score : ' : 'Score: ') + score + '/6';
  document.getElementById('q-counter').textContent = (currentIndex + 1) + '/6';
  document.getElementById('progress-fill').style.width = (((currentIndex) / questions.length * 100) + (100 / questions.length)) + '%';
}

function updateAskBtn() {
  document.getElementById('ask-btn-text').textContent = lang === 'fr'
    ? '💬 Poser une question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's restantes' : ' restante') + ')'
    : '💬 Ask a question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's' : '') + ' remaining)';
}

function toggleAsk() {
  var row = document.getElementById('ask-input-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

async function sendAsk() {
  if (questionsLeft <= 0) return;
  var input = document.getElementById('ask-input');
  var reply = document.getElementById('ask-reply');
  var question = input.value.trim();
  if (!question) return;
  questionsLeft--;
  input.value = '';
  document.getElementById('ask-input-row').style.display = 'none';
  if (questionsLeft === 0) { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  else { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  reply.textContent = lang === 'fr' ? 'Recherche en cours...' : 'Searching...';
  reply.style.display = 'block';
  try {
    var response = await fetch('https://brainfest-ai.c-piault.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        topic: lang === 'fr' ? 'les plantes médicinales et leurs effets sur la peau' : 'medicinal plants and their effects on the skin',
        language: lang
      })
    });
    var data = await response.json();
    reply.textContent = data.answer || (lang === 'fr' ? 'Désolé, je ne peux pas répondre.' : 'Sorry, I cannot answer.');
  } catch (error) {
    reply.textContent = lang === 'fr' ? 'Erreur de connexion. Réessayez.' : 'Connection error. Please try again.';
  }
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('lang-toggle').textContent = lang === 'fr' ? 'FR' : 'EN';
  renderQuestion(); updateHeader();
}
</script>
</body>
</html>

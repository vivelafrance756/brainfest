<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrilexic — Quiz Peau Adaptatif</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #3d6b4a;
    --sage-mid: #6b9e78;
    --sage-light: #e8f5ec;
    --terra: #c4784a;
    --gold: #c9a84c;
    --gold-light: #fef9ed;
    --cream: #f7f3ec;
    --charcoal: #2a2520;
    --grey: #7a7268;
    --grey-light: #f0ede8;
    --white: #ffffff;
    --error: #c0392b;
    --success: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(61,107,74,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(196,120,74,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 300;
    color: var(--charcoal);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--sage);
  }

  .header p {
    font-size: 15px;
    color: var(--grey);
    line-height: 1.7;
    max-width: 500px;
    margin: 0 auto;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grey);
  }

  .progress-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--sage);
    font-weight: 600;
  }

  .progress-bar {
    height: 4px;
    background: var(--grey-light);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Difficulty badge */
  .difficulty-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    transition: all 0.4s ease;
  }
  .diff-debutant { background: #e8f5ec; color: var(--sage); }
  .diff-intermediaire { background: var(--gold-light); color: var(--terra); }
  .diff-expert { background: #fdf0e8; color: var(--error); }

  /* Card */
  .card {
    background: var(--white);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 2px 40px rgba(42,37,32,0.08), 0 1px 4px rgba(42,37,32,0.04);
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease both;
  }

  /* Weak point indicator */
  .weak-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: #fff8ed;
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--terra);
    letter-spacing: 0.5px;
  }

  .question-number {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 16px;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 400;
    line-height: 1.4;
    color: var(--charcoal);
    margin-bottom: 32px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 20px;
    border: 1.5px solid var(--grey-light);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--cream);
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--charcoal);
    line-height: 1.5;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--sage-mid);
    background: var(--sage-light);
    transform: translateX(4px);
  }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--grey-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--grey);
    flex-shrink: 0;
    transition: all 0.25s ease;
  }

  .option:hover:not(:disabled) .option-letter {
    background: var(--sage);
    color: var(--white);
  }

  .option.correct {
    border-color: var(--success);
    background: #f0fdf4;
    transform: translateX(0);
  }
  .option.correct .option-letter {
    background: var(--success);
    color: var(--white);
  }

  .option.wrong {
    border-color: var(--error);
    background: #fdf0f0;
  }
  .option.wrong .option-letter {
    background: var(--error);
    color: var(--white);
  }

  .option:disabled { cursor: not-allowed; }

  /* Explanation */
  .explanation {
    margin-top: 24px;
    padding: 20px 24px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    display: none;
    animation: fadeUp 0.4s ease both;
  }
  .explanation.correct-exp {
    background: #f0fdf4;
    border-left: 3px solid var(--success);
    color: #1a5c2a;
  }
  .explanation.wrong-exp {
    background: #fdf0f0;
    border-left: 3px solid var(--error);
    color: #7a1a1a;
  }

  .explanation-title {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 32px;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--sage);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(61,107,74,0.25);
  }
  .btn-primary:hover { 
    background: #2d5237; 
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(61,107,74,0.35);
  }

  .btn-next {
    margin-top: 24px;
    display: none;
    width: 100%;
  }

  /* Loading */
  .loading-wrap {
    text-align: center;
    padding: 60px 20px;
  }

  .loader {
    display: inline-block;
    width: 48px;
    height: 48px;
    border: 3px solid var(--grey-light);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }

  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--charcoal);
    margin-bottom: 8px;
  }

  .loading-sub {
    font-size: 13px;
    color: var(--grey);
  }

  /* Start screen */
  .start-screen {
    text-align: center;
    padding: 20px 0;
  }

  .start-icon {
    font-size: 64px;
    margin-bottom: 24px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  .start-features {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 32px 0;
  }

  .feature-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: var(--sage-light);
    border-radius: 50px;
    font-size: 13px;
    color: var(--sage);
    font-weight: 500;
  }

  /* Results */
  .results-screen {
    text-align: center;
  }

  .results-icon {
    font-size: 72px;
    display: block;
    margin-bottom: 24px;
    animation: bounceIn 0.6s ease both;
  }

  .results-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: var(--sage);
    line-height: 1;
    margin-bottom: 8px;
  }

  .results-label {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 32px;
  }

  .results-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 32px 0;
  }

  .breakdown-item {
    padding: 20px 16px;
    background: var(--cream);
    border-radius: 16px;
    text-align: center;
  }

  .breakdown-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 400;
    color: var(--sage);
    display: block;
  }

  .breakdown-lbl {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--grey);
    margin-top: 4px;
  }

  .weak-points-summary {
    background: var(--gold-light);
    border-radius: 16px;
    padding: 24px;
    margin: 24px 0;
    text-align: left;
  }

  .weak-points-title {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--terra);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .weak-point-tag {
    display: inline-block;
    padding: 4px 12px;
    background: white;
    border: 1px solid var(--gold);
    border-radius: 20px;
    font-size: 12px;
    color: var(--terra);
    margin: 4px;
  }

  /* Error */
  .error-card {
    background: #fdf0f0;
    border: 1px solid var(--error);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    color: var(--error);
  }

  /* API key setup */
  .setup-screen {
    text-align: center;
  }

  .api-input-wrap {
    margin: 24px 0;
    text-align: left;
  }

  .api-input-wrap label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .api-input {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid var(--grey-light);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--charcoal);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--sage); }

  .api-note {
    font-size: 12px;
    color: var(--grey);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* Responsive */
  @media (max-width: 600px) {
    .container { padding: 24px 16px 48px; }
    .card { padding: 28px 20px; }
    .results-breakdown { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .breakdown-item { padding: 14px 8px; }
    .breakdown-num { font-size: 28px; }
    .start-features { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="brand">Nutrilexic · Quiz Adaptatif</div>
    <h1>Votre peau a<br><em>une histoire à raconter</em></h1>
    <p>Quiz intelligent sur la santé cutanée — acné, eczéma, psoriasis.<br>Les questions s'adaptent à vos réponses en temps réel.</p>
  </div>

  <!-- Main content area -->
  <div id="app"></div>

</div>

<script>
// ============================================================
// CONFIGURATION — Replace with your Anthropic API key
// ============================================================
const API_KEY = "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";
const MODEL = "claude-sonnet-4-20250514";

// ============================================================
// STATE
// ============================================================
const state = {
  apiKey: API_KEY,
  questionNumber: 0,
  totalQuestions: 10,
  score: 0,
  history: [],           // [{topic, difficulty, correct}]
  weakPoints: {},        // {topic: wrongCount}
  currentQuestion: null,
  answered: false,
  phase: API_KEY === "YOUR_API_KEY_HERE" ? "setup" : "start"
};

// Topics for skin health
const TOPICS = [
  "acné et follicules pileux",
  "eczéma et barrière cutanée",
  "psoriasis et immunité",
  "microbiome cutané",
  "inflammation cutanée",
  "compléments alimentaires pour la peau",
  "nutrition et peau",
  "stress et peau",
  "hormones et peau",
  "traitement naturel des affections cutanées"
];

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById("app");
  switch(state.phase) {
    case "setup":    app.innerHTML = renderSetup(); break;
    case "start":    app.innerHTML = renderStart(); break;
    case "loading":  app.innerHTML = renderLoading(); break;
    case "question": app.innerHTML = renderQuestion(); break;
    case "results":  app.innerHTML = renderResults(); break;
    case "error":    app.innerHTML = renderError(); break;
  }
  attachListeners();
}

function renderSetup() {
  return `
    <div class="card setup-screen">
      <span style="font-size:48px;display:block;margin-bottom:20px;">🔑</span>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;margin-bottom:12px;">Configuration API</h2>
      <p style="color:var(--grey);font-size:14px;margin-bottom:8px;">Entrez votre clé Anthropic pour activer les questions générées par IA.</p>
      <div class="api-input-wrap">
        <label>Clé API Anthropic</label>
        <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off"/>
        <p class="api-note">⚠️ Prototype uniquement — ne pas utiliser en production.<br>Obtenez une clé sur <strong>console.anthropic.com</strong></p>
      </div>
      <button class="btn btn-primary" id="saveKeyBtn" style="width:100%;">Activer le quiz IA →</button>
    </div>
  `;
}

function renderStart() {
  return `
    <div class="card start-screen">
      <span class="start-icon">🌿</span>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;margin-bottom:12px;">Prêt à tester vos connaissances ?</h2>
      <p style="color:var(--grey);font-size:15px;line-height:1.7;max-width:460px;margin:0 auto;">
        ${state.totalQuestions} questions générées par IA sur la santé cutanée. 
        La difficulté et les sujets s'adaptent automatiquement à vos réponses.
      </p>
      <div class="start-features">
        <div class="feature-pill">🧠 Difficulté adaptative</div>
        <div class="feature-pill">🎯 Cible vos points faibles</div>
        <div class="feature-pill">✨ Questions uniques à chaque fois</div>
      </div>
      <button class="btn btn-primary" id="startBtn" style="font-size:16px;padding:16px 48px;">
        Commencer le quiz →
      </button>
    </div>
  `;
}

function renderLoading() {
  const tips = [
    "Analyse de vos performances...",
    "Génération d'une question ciblée...",
    "Calibration de la difficulté...",
    "Préparation de votre défi...",
  ];
  const tip = tips[Math.floor(Math.random() * tips.length)];
  return `
    <div class="card loading-wrap">
      <div class="loader"></div>
      <div class="loading-text">Question ${state.questionNumber + 1} / ${state.totalQuestions}</div>
      <div class="loading-sub">${tip}</div>
    </div>
  `;
}

function renderQuestion() {
  const q = state.currentQuestion;
  if (!q) return "";

  const diff = getDifficulty();
  const diffClass = diff === "Débutant" ? "diff-debutant" : diff === "Intermédiaire" ? "diff-intermediaire" : "diff-expert";
  const progress = (state.questionNumber / state.totalQuestions) * 100;

  const topWeakPoint = getTopWeakPoint();

  return `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">Question ${state.questionNumber + 1} · ${state.totalQuestions}</span>
        <span class="progress-score">Score : ${state.score}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <span class="difficulty-badge ${diffClass}">● ${diff}</span>
      ${topWeakPoint ? `<div class="weak-indicator">🎯 Focus : ${topWeakPoint}</div>` : ""}
    </div>

    <div class="card" id="questionCard">
      <div class="question-number">Question ${state.questionNumber + 1}</div>
      <div class="question-text">${q.question}</div>
      <div class="options">
        ${q.answers.map((a, i) => `
          <button class="option" data-index="${i}" id="opt${i}">
            <span class="option-letter">${String.fromCharCode(65+i)}</span>
            <span>${a}</span>
          </button>
        `).join("")}
      </div>
      <div class="explanation" id="explanation"></div>
      <button class="btn btn-primary btn-next" id="nextBtn">
        ${state.questionNumber + 1 >= state.totalQuestions ? "Voir mes résultats →" : "Question suivante →"}
      </button>
    </div>
  `;
}

function renderResults() {
  const pct = Math.round((state.score / state.totalQuestions) * 100);
  const correct = state.history.filter(h => h.correct).length;
  const wrong = state.history.filter(h => !h.correct).length;

  let emoji = "🌟";
  let message = "Excellent travail !";
  if (pct >= 80) { emoji = "🏆"; message = "Maîtrise exceptionnelle !"; }
  else if (pct >= 60) { emoji = "🌿"; message = "Belles connaissances !"; }
  else if (pct >= 40) { emoji = "💪"; message = "Continuez à apprendre !"; }
  else { emoji = "🌱"; message = "Chaque erreur est un apprentissage."; }

  const weakTopics = Object.entries(state.weakPoints)
    .filter(([,v]) => v >= 1)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 4)
    .map(([t]) => t);

  return `
    <div class="card results-screen">
      <span class="results-icon">${emoji}</span>
      <div class="results-score">${pct}%</div>
      <div class="results-label">${message}</div>

      <div class="results-breakdown">
        <div class="breakdown-item">
          <span class="breakdown-num" style="color:var(--success)">${correct}</span>
          <div class="breakdown-lbl">Correctes</div>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num" style="color:var(--error)">${wrong}</span>
          <div class="breakdown-lbl">À revoir</div>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-num">${state.score}</span>
          <div class="breakdown-lbl">Score</div>
        </div>
      </div>

      ${weakTopics.length > 0 ? `
        <div class="weak-points-summary">
          <div class="weak-points-title">🎯 Sujets à approfondir</div>
          ${weakTopics.map(t => `<span class="weak-point-tag">${t}</span>`).join("")}
        </div>
      ` : ""}

      <button class="btn btn-primary" id="restartBtn" style="width:100%;margin-top:8px;">
        Recommencer avec de nouvelles questions →
      </button>
    </div>
  `;
}

function renderError() {
  return `
    <div class="error-card">
      <div style="font-size:36px;margin-bottom:16px;">⚠️</div>
      <strong>Erreur de connexion à l'API</strong>
      <p style="margin-top:8px;font-size:14px;opacity:0.8;">${state.errorMessage || "Vérifiez votre clé API Anthropic."}</p>
      <button class="btn btn-primary" id="retryBtn" style="margin-top:20px;background:var(--error);">Réessayer</button>
    </div>
  `;
}

// ============================================================
// LISTENERS
// ============================================================
function attachListeners() {
  document.getElementById("saveKeyBtn")?.addEventListener("click", () => {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key.startsWith("sk-ant-")) {
      document.getElementById("apiKeyInput").classList.add("shake");
      setTimeout(() => document.getElementById("apiKeyInput")?.classList.remove("shake"), 400);
      return;
    }
    state.apiKey = key;
    state.phase = "start";
    render();
  });

  document.getElementById("startBtn")?.addEventListener("click", startQuiz);
  document.getElementById("nextBtn")?.addEventListener("click", nextQuestion);
  document.getElementById("restartBtn")?.addEventListener("click", restartQuiz);
  document.getElementById("retryBtn")?.addEventListener("click", () => { state.phase = "start"; render(); });

  document.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => handleAnswer(parseInt(btn.dataset.index)));
  });
}

// ============================================================
// GAME LOGIC
// ============================================================
function startQuiz() {
  state.questionNumber = 0;
  state.score = 0;
  state.history = [];
  state.weakPoints = {};
  state.phase = "loading";
  render();
  generateQuestion();
}

function restartQuiz() {
  startQuiz();
}

function getDifficulty() {
  if (state.questionNumber < 3) return "Débutant";
  const recent = state.history.slice(-3);
  const recentScore = recent.filter(h => h.correct).length / recent.length;
  if (recentScore >= 0.8) return "Expert";
  if (recentScore >= 0.5) return "Intermédiaire";
  return "Débutant";
}

function getTopWeakPoint() {
  const entries = Object.entries(state.weakPoints).filter(([,v]) => v >= 1).sort((a,b) => b[1]-a[1]);
  return entries[0]?.[0] || null;
}

function selectTopic() {
  // Prioritize weak points 60% of the time
  const weakEntries = Object.entries(state.weakPoints).filter(([,v]) => v >= 1);
  if (weakEntries.length > 0 && Math.random() < 0.6) {
    weakEntries.sort((a,b) => b[1]-a[1]);
    return weakEntries[0][0];
  }
  return TOPICS[Math.floor(Math.random() * TOPICS.length)];
}

async function generateQuestion() {
  const difficulty = getDifficulty();
  const topic = selectTopic();

  const diffInstructions = {
    "Débutant": "Question simple et accessible au grand public, concepts de base.",
    "Intermédiaire": "Question de niveau intermédiaire, nécessite des connaissances en santé naturelle.",
    "Expert": "Question avancée pour professionnels de santé fonctionnelle et naturopathes, inclut mécanismes biologiques récents."
  };

  const recentQuestions = state.history.slice(-3).map(h => h.question).join("; ");

  const prompt = `Tu es un expert en santé cutanée, naturopathie et médecine fonctionnelle.

Génère une question de quiz en français sur le sujet : "${topic}"
Niveau de difficulté : ${difficulty} — ${diffInstructions[difficulty]}

${recentQuestions ? `Questions récentes déjà posées (ne pas répéter) : ${recentQuestions}` : ""}

Règles :
- La question doit être précise, sourcée, et pédagogique
- 4 réponses possibles dont une seule correcte
- L'explication doit mentionner les mécanismes biologiques ou les études récentes quand pertinent
- Ton : scientifique mais accessible, avec parfois une touche d'humour subtil
- UNIQUEMENT du JSON valide, aucun texte avant ou après

Format JSON strict :
{
  "question": "...",
  "answers": ["réponse A", "réponse B", "réponse C", "réponse D"],
  "correct": 0,
  "explanation": "...",
  "topic": "${topic}"
}`;

  try {
    console.log("Key prefix:", state.apiKey.substring(0, 25));
    console.log("Calling API...");

    // Robust JSON extraction — handles markdown fences and extra text
    let clean = text.replace(/```json|```/g, "").trim();
    // Extract just the JSON object if there's surrounding text
    const jsonMatch = clean.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("Format de réponse invalide. Réessayez.");
    clean = jsonMatch[0];
    const q = JSON.parse(clean);

    state.currentQuestion = q;
    state.phase = "question";
    render();

  } catch(err) {
    console.error(err);
    // Auto-retry once on parse errors
    if (!state._retried && err instanceof SyntaxError) {
      state._retried = true;
      console.log("Retrying after parse error...");
      setTimeout(() => generateQuestion(), 1000);
      return;
    }
    state._retried = false;
    state.errorMessage = err.message;
    state.phase = "error";
    render();
  }
}

function handleAnswer(index) {
  if (state.answered) return;
  state.answered = true;

  const q = state.currentQuestion;
  const isCorrect = index === q.correct;

  // Update score and history
  if (isCorrect) state.score++;
  state.history.push({
    question: q.question,
    topic: q.topic || selectTopic(),
    difficulty: getDifficulty(),
    correct: isCorrect
  });

  // Update weak points
  if (!isCorrect) {
    const topic = q.topic || "général";
    state.weakPoints[topic] = (state.weakPoints[topic] || 0) + 1;
  }

  // Visual feedback
  document.querySelectorAll(".option").forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add("correct");
    else if (i === index && !isCorrect) btn.classList.add("wrong");
  });

  // Show explanation
  const expEl = document.getElementById("explanation");
  expEl.className = `explanation ${isCorrect ? "correct-exp" : "wrong-exp"}`;
  expEl.style.display = "block";
  expEl.innerHTML = `
    <div class="explanation-title">${isCorrect ? "✅ Correct !" : "❌ Pas tout à fait..."}</div>
    ${q.explanation}
  `;

  // Show next button
  document.getElementById("nextBtn").style.display = "flex";
}

function nextQuestion() {
  state.questionNumber++;
  state.answered = false;
  state.currentQuestion = null;

  if (state.questionNumber >= state.totalQuestions) {
    state.phase = "results";
    render();
    return;
  }

  state.phase = "loading";
  render();
  generateQuestion();
}

// ============================================================
// INIT
// ============================================================
render();
</script>

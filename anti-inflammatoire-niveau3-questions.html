#reformulation-block { background: #fff8e8; border-radius: 12px; padding: 16px; margin-top: 12px; border: 1px solid rgba(212,146,58,0.3); display: none; }
#reformulation-title { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--amber); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
#reformulation-text { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--indigo-dark); line-height: 1.5; margin-bottom: 16px; }
#reformulation-options { display: flex; gap: 4%; }
.refo-btn { width: 48%; display: inline-flex; justify-content: center; align-items: center; padding: 12px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; border: 1px solid #ccc; background: #ffffff; cursor: pointer; min-height: 44px; transition: background 0.2s, border-color 0.2s, color 0.2s; gap: 6px; }

#continuer-btn { width: 100%; background: var(--blue); color: #ffffff; border: none; border-radius: 12px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; min-height: 44px; display: none; margin-bottom: 12px; }

if (!sessionStorage.getItem('bf_access')) { window.location.href = 'index.html'; }

var lang = 'fr';

var questions = [
  {
    question_fr: "PIÈGE : Les suppléments anti-inflammatoires naturels remplacent-ils les médicaments anti-inflammatoires ?",
    question_en: "TRAP : Do natural anti-inflammatory supplements replace anti-inflammatory medications ?",
    options: [
      {"letter": "A", "text_fr": "Oui, la curcumine est aussi efficace que l'ibuprofène", "text_en": "Yes, curcumin is as effective as ibuprofen"},
      {"letter": "B", "text_fr": "Non, ils peuvent être complémentaires mais ne remplacent pas les traitements médicaux dans les maladies inflammatoires sévères", "text_en": "No, they can be complementary but do not replace medical treatments in severe inflammatory diseases"},
      {"letter": "C", "text_fr": "Oui, les oméga-3 remplacent les corticoïdes", "text_en": "Yes, omega-3 replace corticosteroids"},
      {"letter": "D", "text_fr": "Non, ils sont totalement inefficaces", "text_en": "No, they are completely ineffective"}
    ],
    correct: "B",
    feedback_ok_fr: "Bonne réponse. La curcumine, les oméga-3 et le resvératrol ont des propriétés anti-inflammatoires documentées mais leurs effets sont incomparables à ceux des médicaments dans les maladies inflammatoires sévères comme la polyarthrite rhumatoïde ou les MICI. L'approche nutritionnelle est complémentaire et préventive, pas substitutive.",
    feedback_ok_en: "Good answer. Curcumin, omega-3 and resveratrol have documented anti-inflammatory properties but their effects are incomparable to those of medications in severe inflammatory diseases such as rheumatoid arthritis or IBD. The nutritional approach is complementary and preventive, not substitutive.",
    feedback_ko_fr: "La médecine intégrative recommande de combiner approche nutritionnelle et traitement médical, pas de choisir l'un contre l'autre. Les compléments anti-inflammatoires naturels ont leur place en prévention et en complément, pas en substitution.",
    feedback_ko_en: "Integrative medicine recommends combining nutritional approach and medical treatment, not choosing one against the other. Natural anti-inflammatory supplements have their place in prevention and as a complement, not as substitution.",
    reformulation_fr: "Les anti-inflammatoires naturels peuvent-ils compléter un traitement médical sans le remplacer ?",
    reformulation_en: "Can natural anti-inflammatories complement medical treatment without replacing it ?",
    reformulation_answer: "Oui",
    reformulation_explanation_fr: "C'est le principe de la médecine intégrative. Les interventions nutritionnelles et les compléments anti-inflammatoires agissent en synergie avec les traitements médicaux conventionnels.",
    reformulation_explanation_en: "This is the principle of integrative medicine. Nutritional interventions and anti-inflammatory supplements act in synergy with conventional medical treatments."
  },
  {
    question_fr: "Le score ORAC mesure-t-il vraiment l'effet anti-inflammatoire des aliments ?",
    question_en: "Does the ORAC score truly measure the anti-inflammatory effect of foods ?",
    options: [
      {"letter": "A", "text_fr": "Oui, un ORAC élevé garantit un fort effet anti-inflammatoire", "text_en": "Yes, a high ORAC guarantees a strong anti-inflammatory effect"},
      {"letter": "B", "text_fr": "Non, l'ORAC mesure la capacité antioxydante in vitro mais ne prédit pas l'effet anti-inflammatoire in vivo", "text_en": "No, ORAC measures antioxidant capacity in vitro but does not predict anti-inflammatory effect in vivo"},
      {"letter": "C", "text_fr": "Oui, c'est le meilleur indicateur disponible", "text_en": "Yes, it is the best available indicator"},
      {"letter": "D", "text_fr": "Non, l'ORAC n'existe pas", "text_en": "No, ORAC does not exist"}
    ],
    correct: "B",
    feedback_ok_fr: "Exactement. L'ORAC (Oxygen Radical Absorbance Capacity) mesure la capacité antioxydante in vitro. Mais la biodisponibilité, le métabolisme et les effets biologiques réels peuvent être très différents in vivo. La FDA a d'ailleurs retiré la base de données ORAC en 2012 car elle induisait les consommateurs en erreur sur les effets réels des aliments.",
    feedback_ok_en: "Exactly. ORAC (Oxygen Radical Absorbance Capacity) measures antioxidant capacity in vitro. But bioavailability, metabolism and actual biological effects can be very different in vivo. The FDA actually removed the ORAC database in 2012 because it was misleading consumers about the actual effects of foods.",
    feedback_ko_fr: "La science de l'inflammation est bien plus complexe qu'un simple score antioxydant. Des aliments avec un ORAC modeste comme le brocoli ou les légumineuses ont des effets anti-inflammatoires in vivo bien supérieurs à certains superaliments à ORAC élevé.",
    feedback_ko_en: "The science of inflammation is far more complex than a simple antioxidant score. Foods with a modest ORAC like broccoli or legumes have in vivo anti-inflammatory effects far superior to some high-ORAC superfoods.",
    reformulation_fr: "Un aliment avec un score ORAC élevé est-il nécessairement très anti-inflammatoire ?",
    reformulation_en: "Is a food with a high ORAC score necessarily very anti-inflammatory ?",
    reformulation_answer: "Non",
    reformulation_explanation_fr: "L'ORAC mesure un effet in vitro qui ne se traduit pas nécessairement in vivo. Les effets anti-inflammatoires réels dépendent de la biodisponibilité, du métabolisme et des mécanismes d'action spécifiques.",
    reformulation_explanation_en: "ORAC measures an in vitro effect that does not necessarily translate in vivo. Real anti-inflammatory effects depend on bioavailability, metabolism and specific mechanisms of action."
  },
  {
    question_fr: "Pourquoi le resvératrol oral a-t-il une biodisponibilité limitée ?",
    question_en: "Why does oral resveratrol have limited bioavailability ?",
    options: [
      {"letter": "A", "text_fr": "Il est toxique pour l'intestin", "text_en": "It is toxic for the intestine"},
      {"letter": "B", "text_fr": "Il est rapidement métabolisé en sulfo et glucuro-conjugués dans l'intestin et le foie, réduisant sa concentration sanguine active", "text_en": "It is rapidly metabolised into sulpho and glucuro-conjugates in the intestine and liver, reducing its active blood concentration"},
      {"letter": "C", "text_fr": "Il est éliminé par les reins avant absorption", "text_en": "It is eliminated by the kidneys before absorption"},
      {"letter": "D", "text_fr": "Sa molécule est trop grande pour être absorbée", "text_en": "Its molecule is too large to be absorbed"}
    ],
    correct: "B",
    feedback_ok_fr: "Exactement. Le resvératrol subit un métabolisme intestinal et hépatique intense. La biodisponibilité de la forme libre est inférieure à 1%. Cependant, ses métabolites (piceatannol, dihydroresvératrol) peuvent conserver une activité biologique. Les formulations liposomales améliorent significativement sa biodisponibilité systémique.",

    feedback_ko_fr: "Le paradoxe français (faible mortalité cardiovasculaire malgré une alimentation riche) a été attribué au resvératrol du vin rouge. Mais les doses présentes dans le vin sont insuffisantes pour un effet systémique significatif. Le bénéfice vient probablement de l'ensemble des polyphénols du vin plutôt que du resvératrol seul.",
    feedback_ko_en: "The French paradox (low cardiovascular mortality despite a rich diet) was attributed to resveratrol in red wine. But the doses present in wine are insufficient for significant systemic effect. The benefit probably comes from the totality of wine polyphenols rather than resveratrol alone.",
    reformulation_fr: "Les formulations liposomales de resvératrol sont-elles mieux absorbées que les formes standards ?",
    reformulation_en: "Are liposomal formulations of resveratrol better absorbed than standard forms ?",
    reformulation_answer: "Oui",
    reformulation_explanation_fr: "Les liposomes protègent le resvératrol du métabolisme intestinal et hépatique, améliorant sa biodisponibilité systémique de façon significative.",

  },
  {

    question_en: "The Dietary Inflammatory Index (DII) is a useful tool because :",

      {"letter": "A", "text_fr": "Il remplace les analyses sanguines", "text_en": "It replaces blood tests"},

      {"letter": "C", "text_fr": "Il mesure uniquement les graisses trans", "text_en": "It only measures trans fats"},
      {"letter": "D", "text_fr": "Il n'est pas validé scientifiquement", "text_en": "It is not scientifically validated"}
    ],
    correct: "B",
    feedback_ok_fr: "Exactement. L'IIA (Dietary Inflammatory Index) a été développé par Shivappa et Hébert à partir de l'analyse de 1943 articles scientifiques. Il attribue des scores positifs (pro-inflammatoire) ou négatifs (anti-inflammatoire) à 45 composants alimentaires. Un IIA négatif est associé à une réduction des marqueurs inflammatoires et du risque de maladies chroniques.",
    feedback_ok_en: "Exactly. The DII (Dietary Inflammatory Index) was developed by Shivappa and Hébert from analysis of 1943 scientific articles. It assigns positive (pro-inflammatory) or negative (anti-inflammatory) scores to 45 dietary components. A negative DII is associated with reduced inflammatory markers and chronic disease risk.",
    feedback_ko_fr: "L'IIA est l'un des outils les plus utiles en recherche nutritionnelle sur l'inflammation. Plusieurs études montrent qu'un IIA négatif est associé à une réduction du risque de cancer colorectal, de maladies cardiovasculaires et de diabète de type 2.",
    feedback_ko_en: "The DII is one of the most useful tools in nutritional inflammation research. Several studies show that a negative DII is associated with reduced risk of colorectal cancer, cardiovascular disease and type 2 diabetes.",
    reformulation_fr: "Un score IIA négatif signifie-t-il une alimentation plutôt anti-inflammatoire ?",
    reformulation_en: "Does a negative DII score mean a predominantly anti-inflammatory diet ?",
    reformulation_answer: "Oui",
    reformulation_explanation_fr: "Un IIA négatif indique une alimentation globalement anti-inflammatoire. Il est corrélé à des niveaux inférieurs de CRP, IL-6 et TNF-alpha dans les études épidémiologiques.",
    reformulation_explanation_en: "A negative DII indicates an overall anti-inflammatory diet. It is correlated with lower levels of CRP, IL-6 and TNF-alpha in epidemiological studies."
  },
  {
    question_fr: "L'axe microbiote-inflammation est important parce que :",
    question_en: "The microbiome-inflammation axis is important because :",
    options: [

      {"letter": "C", "text_fr": "Le microbiote agit uniquement sur la digestion", "text_en": "The microbiome only acts on digestion"},
      {"letter": "D", "text_fr": "Il n'y a pas de lien documenté", "text_en": "There is no documented link"}

    feedback_ko_en: "The gut microbiome is now considered a full immune organ in its own right. Its composition largely determines the level of systemic chronic inflammation.",

    reformulation_en: "Does butyrate produced by the microbiome have anti-inflammatory effects ?",

    correct: "B",
    feedback_ok_fr: "Exactement. L'inflammation aiguë est essentielle : elle combat les infections, répare les tissus et initie la cicatrisation. Supprimer systématiquement cette inflammation (par des AINS chroniques par exemple) peut compromettre ces fonctions essentielles et augmenter le risque d'infections. C'est l'inflammation chronique non résolue qui est pathologique.",

  document.getElementById('question-text').textContent = q['question_' + lang];
  var list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-letter', opt.letter);
    btn.onclick = function() { selectOption(opt.letter); };
    btn.innerHTML = '<span class="option-letter">' + opt.letter + '</span><span class="option-text">' + opt['text_' + lang] + '</span><span class="option-check">✓</span>';
    list.appendChild(btn);
  });
  var vb = document.getElementById('validate-btn');
  vb.disabled = true; vb.style.display = 'block';
  vb.textContent = lang === 'fr' ? 'Valider' : 'Validate';
  document.getElementById('feedback-block').style.display = 'none';
  document.getElementById('reformulation-block').style.display = 'none';
  document.getElementById('reformulation-title').textContent = '';
  document.getElementById('reformulation-options').innerHTML = '';
  document.getElementById('ask-row').style.display = 'none';
  document.getElementById('ask-input-row').style.display = 'none';
  document.getElementById('ask-reply').textContent = ''; document.getElementById('ask-reply').style.display = 'none';
  document.getElementById('continuer-btn').style.display = 'none';
  document.getElementById('pubmed-block').style.display = 'none';
  updateHeader();
}

function selectOption(letter) {
  if (validated) return;
  selectedLetter = letter;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    btn.classList.remove('selected');
    if (btn.getAttribute('data-letter') === letter) btn.classList.add('selected');
  });
  document.getElementById('validate-btn').disabled = false;
}

function validate() {
  if (!selectedLetter || validated) return;
  validated = true;
  var q = questions[currentIndex];
  var isCorrect = selectedLetter === q.correct;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    var letter = btn.getAttribute('data-letter');
    btn.onclick = null;
    if (letter === q.correct) { btn.classList.remove('selected'); btn.classList.add('correct'); }
    else if (letter === selectedLetter && !isCorrect) { btn.classList.remove('selected'); btn.classList.add('wrong'); }
  });
  document.getElementById('validate-btn').style.display = 'none';
  var fb = document.getElementById('feedback-block');
  fb.style.display = 'block';
  if (isCorrect) {
    score++;
    fb.style.background = '#e8f4f0';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#2a7fa8">✓</span> <span style="color:#2a7fa8">' + (lang === 'fr' ? 'Bonne réponse !' : 'Correct!') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ok_' + lang];
    showPostFeedback();
  } else {
    fb.style.background = '#fdecea';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#e74c3c">✗</span> <span style="color:#e74c3c">' + (lang === 'fr' ? 'Pas tout à fait...' : 'Not quite...') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ko_' + lang];
    showReformulation();
  }
  updateHeader();
}

function showReformulation() {
  var q = questions[currentIndex];
  document.getElementById('reformulation-block').style.display = 'block';
  document.getElementById('reformulation-title').innerHTML = '🔄 ' + (lang === 'fr' ? 'Essayons autrement...' : 'Let\'s try another way...');
  document.getElementById('reformulation-text').textContent = q['reformulation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'none';
  var opts = document.getElementById('reformulation-options');
  opts.innerHTML = '';
  var refoCorrectIsOui = q.reformulation_answer.toLowerCase().indexOf('oui') === 0;
  var choices = [
    { text_fr: 'Oui', text_en: 'Yes', correct: refoCorrectIsOui },
    { text_fr: 'Non', text_en: 'No', correct: !refoCorrectIsOui }
  ];
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'refo-btn';
    btn.textContent = c['text_' + lang];
    btn.setAttribute('data-correct', c.correct ? '1' : '0');
    btn.onclick = function() { answerReformulation(c.correct, btn, opts.querySelectorAll('.refo-btn')); };
    opts.appendChild(btn);
  });
}

function answerReformulation(isCorrect, clickedBtn, allBtns) {
  if (reformulationAnswered) { if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); } return; }
  if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); return; }
  reformulationAnswered = true;
  allBtns.forEach(function(btn) {
    btn.onclick = null;
    if (btn.getAttribute('data-correct') === '1') { btn.classList.add('refo-correct'); btn.innerHTML += ' ✓'; }
  });
  var q = questions[currentIndex];
  document.getElementById('reformulation-explanation').textContent = q['reformulation_explanation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'block';
  setTimeout(function() { showPostFeedback(); }, 1000);
}

function showPostFeedback() {
  document.getElementById('ask-row').style.display = 'block';
  if (questionsLeft > 0) { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  else { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  if (currentIndex === questions.length - 1) document.getElementById('pubmed-block').style.display = 'block';
  document.getElementById('continuer-btn').style.display = 'block';
  document.getElementById('continuer-btn').textContent = lang === 'fr' ? 'Continuer' : 'Continue';
}

function continuer() {
  if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else { sessionStorage.setItem('bf_score_ai3', score); window.location.href = 'anti-inflammatoire-niveau3-fin.html'; }
}

function updateHeader() {
  document.getElementById('score-text').textContent = (lang === 'fr' ? 'Score : ' : 'Score: ') + score + '/6';
  document.getElementById('q-counter').textContent = (currentIndex + 1) + '/6';
  document.getElementById('progress-fill').style.width = (((currentIndex) / questions.length * 100) + (100 / questions.length)) + '%';
}

function updateAskBtn() {
  document.getElementById('ask-btn-text').textContent = lang === 'fr'
    ? '💬 Poser une question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's restantes' : ' restante') + ')'
    : '💬 Ask a question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's' : '') + ' remaining)';
}

function toggleAsk() {
  var row = document.getElementById('ask-input-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

async function sendAsk() {
  if (questionsLeft <= 0) return;
  var input = document.getElementById('ask-input');
  var reply = document.getElementById('ask-reply');
  var question = input.value.trim();
  if (!question) return;
  questionsLeft--;
  input.value = '';
  document.getElementById('ask-input-row').style.display = 'none';
  if (questionsLeft === 0) { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  else { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  reply.textContent = lang === 'fr' ? 'Recherche en cours...' : 'Searching...';
  reply.style.display = 'block';
  try {
    var response = await fetch('https://brainfest-ai.c-piault.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        topic: lang === 'fr' ? "l'inflammation chronique et l'alimentation anti-inflammatoire" : 'chronic inflammation and anti-inflammatory diet',
        language: lang
      })
    });
    var data = await response.json();
    reply.textContent = data.answer || (lang === 'fr' ? 'Désolé, je ne peux pas répondre.' : 'Sorry, I cannot answer.');
  } catch (error) {
    reply.textContent = lang === 'fr' ? 'Erreur de connexion. Réessayez.' : 'Connection error. Please try again.';
  }
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('lang-toggle').textContent = lang === 'fr' ? 'FR' : 'EN';
  renderQuestion(); updateHeader();
}
</script>
</body>
</html>

<style>
:root { --indigo-dark: #2d3d4a; --indigo-mid: #1a2535; --amber: #d4923a; --cream: #f7f3ec; --sage: #6b9e78; --blue: #2a7fa8; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { min-width: 375px; overflow-x: hidden; }
body { font-family: 'DM Sans', sans-serif; background: #f5ede8; color: var(--indigo-dark); min-width: 375px; min-height: 100vh; }
#quiz-header { background: #f5ede8; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.06); }

#progress-fill { height: 4px; background: var(--blue); transition: width 0.4s ease; }
#quiz-main { padding: 16px 20px 32px; max-width: 520px; margin: 0 auto; }
#question-card { background: #ffffff; border-radius: 16px; padding: 24px 20px; margin-bottom: 12px; }
#question-text { font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--indigo-dark); font-weight: 500; line-height: 1.5; margin-bottom: 20px; }
.option-btn { width: 100%; background: #f5ede8; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; min-height: 44px; }
.option-btn:last-child { margin-bottom: 0; }
.option-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; background: #ffffff; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--indigo-dark); flex-shrink: 0; transition: background 0.15s, border-color 0.15s, color 0.15s; }
.option-text { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--indigo-dark); flex: 1; }
.option-check { font-size: 16px; color: var(--blue); display: none; }
.option-btn.selected { border-color: var(--blue); background: #eaf4f8; }

.option-btn.correct { border-color: var(--blue); background: #e8f4f0; }
.option-btn.correct .option-letter { background: var(--blue); border-color: var(--blue); color: #fff; }

.option-btn.wrong { border-color: #e74c3c; background: #fdecea; }
.option-btn.wrong .option-letter { background: #e74c3c; border-color: #e74c3c; color: #fff; }

#validate-btn:disabled { background: #b0c8d8; cursor: not-allowed; }
#feedback-block { background: #e8f4f0; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: none; }
#feedback-top { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
#feedback-text { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--indigo-dark); line-height: 1.6; }
#reformulation-block { background: #fff8e8; border-radius: 12px; padding: 16px; margin-top: 12px; border: 1px solid rgba(212,146,58,0.3); display: none; }
#reformulation-title { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--amber); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
#reformulation-text { font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--indigo-dark); line-height: 1.5; margin-bottom: 16px; }
#reformulation-options { display: flex; gap: 4%; }
.refo-btn { width: 48%; display: inline-flex; justify-content: center; align-items: center; padding: 12px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; border: 1px solid #ccc; background: #ffffff; cursor: pointer; min-height: 44px; transition: background 0.2s, border-color 0.2s, color 0.2s; gap: 6px; }
.refo-btn.refo-correct { background: #e8f4f0; border-color: var(--blue); color: var(--blue); }
.refo-btn.refo-wrong { background: #fdecea; border-color: #e74c3c; color: #e74c3c; }
#reformulation-explanation { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #555; line-height: 1.6; margin-top: 12px; display: none; }
#ask-row { display: none; margin-bottom: 12px; }
#ask-btn { width: 100%; background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; cursor: pointer; text-align: left; min-height: 44px; }
#ask-input-row { display: none; margin-top: 8px; flex-direction: row; gap: 8px; }
#ask-input { flex: 1; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; min-height: 44px; }
#ask-send { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; min-height: 44px; }
#ask-reply { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; margin-top: 6px; display: none; font-style: italic; }
#pubmed-block { background: #ffffff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: none; }
#pubmed-block .pubmed-title { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
#pubmed-block a { display: block; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--blue); text-decoration: none; line-height: 1.5; margin-bottom: 6px; }
#pubmed-block a:hover { text-decoration: underline; }
#continuer-btn { width: 100%; background: var(--blue); color: #ffffff; border: none; border-radius: 12px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; min-height: 44px; display: none; margin-bottom: 12px; }
#lang-toggle { background: #d4923a; color: #ffffff; border: none; border-radius: 20px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
</style>

<script>
if (!sessionStorage.getItem('bf_access')) { window.location.href = 'index.html'; }

var lang = 'fr';

var questions = [
{
  question_fr: "PIÈGE : Les huiles essentielles bio sont-elles plus sûres que les conventionnelles ?",
  question_en: "TRAP : Are organic essential oils safer than conventional ones ?",
  options: [
    {letter:"A", text_fr:"Oui, le bio garantit l'absence de pesticides et une meilleure tolérance", text_en:"Yes, organic guarantees absence of pesticides and better tolerance"},
    {letter:"B", text_fr:"Non, la certification bio ne change pas la composition en molécules actives ni le potentiel allergisant des huiles essentielles", text_en:"No, organic certification does not change the composition in active molecules or the allergenic potential of essential oils"},
    {letter:"C", text_fr:"Oui, elles contiennent moins de terpènes allergisants", text_en:"Yes, they contain fewer allergenic terpenes"},
    {letter:"D", text_fr:"Non, les huiles bio sont moins concentrées", text_en:"No, organic oils are less concentrated"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. La certification bio garantit l'absence de pesticides de synthèse dans la culture, ce qui est positif. Mais elle ne change en rien la composition chimique de l'huile essentielle ni son potentiel allergisant. Le linalol allergisant de la lavande bio est identique à celui de la lavande conventionnelle. Les allergènes de contact sont intrinsèques à la plante, pas à son mode de culture.",
  feedback_ok_en: "Exactly. Organic certification guarantees the absence of synthetic pesticides in cultivation, which is positive. But it does not change the chemical composition of the essential oil or its allergenic potential. The allergenic linalool of organic lavender is identical to that of conventional lavender. Contact allergens are intrinsic to the plant, not to its cultivation method.",
  feedback_ko_fr: "Bio et sans risque ne sont pas synonymes. La qualité chimotypée (HECT : Huile Essentielle Chémotypée) et le chémotype sont plus importants que la certification bio pour garantir l'efficacité et la sécurité d'une huile essentielle.",
  feedback_ko_en: "Organic and risk-free are not synonymous. Chemotyped quality (HECL: Chemotyped Essential Oil) and the chemotype are more important than organic certification to guarantee the effectiveness and safety of an essential oil.",
  reformulation_fr: "Une huile essentielle bio peut-elle quand même provoquer des allergies ?",
  reformulation_en: "Can an organic essential oil still cause allergies ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Les allergènes de contact des huiles essentielles (linalol, limonène, géraniol) sont des molécules naturelles intrinsèques à la plante. La certification bio ne les supprime pas.",
  reformulation_explanation_en: "Contact allergens in essential oils (linalool, limonene, geraniol) are natural molecules intrinsic to the plant. Organic certification does not suppress them."
},
{
  question_fr: "Le chémotype est important en aromathérapie parce que :",
  question_en: "The chemotype is important in aromatherapy because :",
  options: [
    {letter:"A", text_fr:"Il indique le prix de l'huile", text_en:"It indicates the price of the oil"},
    {letter:"B", text_fr:"Des plantes de la même espèce peuvent avoir des compositions chimiques très différentes selon leur origine géographique, avec des effets et des risques distincts", text_en:"Plants of the same species can have very different chemical compositions depending on their geographical origin, with distinct effects and risks"},
    {letter:"C", text_fr:"Il garantit l'absence d'allergènes", text_en:"It guarantees the absence of allergens"},
    {letter:"D", text_fr:"Il n'a aucune importance pratique", text_en:"It has no practical importance"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. Le chémotype (CT) désigne la variété chimique d'une plante. Exemple : Thymus vulgaris CT thymol est antimicrobien puissant mais dermocaustique, tandis que Thymus vulgaris CT linalol est doux et bien toléré. Rosmarinus officinalis CT camphre est contre-indiqué en cas d'épilepsie, CT cinéole non. Ces différences sont fondamentales pour la sécurité.",
  feedback_ok_en: "Exactly. The chemotype (CT) designates the chemical variety of a plant. Example: Thymus vulgaris CT thymol is a powerful antimicrobial but dermocaustic, while Thymus vulgaris CT linalool is gentle and well-tolerated. Rosmarinus officinalis CT camphor is contraindicated in epilepsy, CT cineole is not. These differences are fundamental for safety.",
  feedback_ko_fr: "Acheter une huile essentielle de thym sans préciser le chémotype est une erreur car il en existe plus de 6 avec des propriétés radicalement différentes. Un aromathérapeute qualifié précise toujours le chémotype.",
  feedback_ko_en: "Buying a thyme essential oil without specifying the chemotype is an error as there are more than 6 with radically different properties. A qualified aromatherapist always specifies the chemotype.",
  reformulation_fr: "Deux huiles essentielles de thym peuvent-elles avoir des effets très différents selon leur chémotype ?",
  reformulation_en: "Can two thyme essential oils have very different effects depending on their chemotype ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Le thym CT thymol est puissant, dermocaustique et antimicrobien. Le thym CT linalol est doux, non irritant et mieux toléré. Même espèce, effets opposés selon le chémotype.",
  reformulation_explanation_en: "Thyme CT thymol is powerful, dermocaustic and antimicrobial. Thyme CT linalool is gentle, non-irritating and better tolerated. Same species, opposite effects depending on chemotype."
},
{
  question_fr: "La phytothérapie et la médecine conventionnelle sont-elles incompatibles ?",
  question_en: "Are herbal medicine and conventional medicine incompatible ?",
  options: [
    {letter:"A", text_fr:"Oui, on doit choisir l'une ou l'autre", text_en:"Yes, one must choose one or the other"},
    {letter:"B", text_fr:"Non, elles sont complémentaires mais les interactions médicamenteuses doivent être systématiquement vérifiées", text_en:"No, they are complementary but drug interactions must be systematically checked"},
    {letter:"C", text_fr:"Oui, les plantes sont toujours supérieures aux médicaments", text_en:"Yes, plants are always superior to medications"},
    {letter:"D", text_fr:"Non, les plantes n'interagissent jamais avec les médicaments", text_en:"No, plants never interact with medications"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. La phytothérapie et la médecine conventionnelle sont complémentaires mais les interactions sont nombreuses et potentiellement graves. Le millepertuis réduit l'efficacité de 50% des médicaments métabolisés par CYP3A4. L'ail et le gingembre à haute dose augmentent le risque de saignement avec les anticoagulants. Toujours informer son médecin de toute phytothérapie.",
  feedback_ok_en: "Exactly. Herbal medicine and conventional medicine are complementary but interactions are numerous and potentially serious. St John's wort reduces the effectiveness of 50% of medications metabolised by CYP3A4. Garlic and ginger at high doses increase bleeding risk with anticoagulants. Always inform your doctor of any herbal medicine.",
  feedback_ko_fr: "Les bases de données d'interactions plantes-médicaments comme la base Thériaque ou le site de l'ANSM permettent de vérifier les interactions. Un pharmacien peut aussi conseiller sur les associations sûres.",
  feedback_ko_en: "Plant-drug interaction databases like the Thériaque database or the ANSM website allow checking interactions. A pharmacist can also advise on safe combinations.",
  reformulation_fr: "Faut-il informer son médecin de toute prise de plantes médicinales ?",
  reformulation_en: "Should one inform their doctor of any medicinal plant intake ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "Les interactions plantes-médicaments peuvent être graves. Le médecin et le pharmacien doivent être informés de toute phytothérapie pour prévenir les interactions dangereuses.",
  reformulation_explanation_en: "Plant-drug interactions can be serious. The doctor and pharmacist must be informed of any herbal medicine to prevent dangerous interactions."
},
{
  question_fr: "Les études in vitro sur les plantes médicinales sont-elles suffisantes pour conclure à leur efficacité chez l'humain ?",
  question_en: "Are in vitro studies on medicinal plants sufficient to conclude their effectiveness in humans ?",
  options: [
    {letter:"A", text_fr:"Oui, si l'effet est prouvé en laboratoire il l'est chez l'humain", text_en:"Yes, if the effect is proven in the laboratory it is proven in humans"},
    {letter:"B", text_fr:"Non, les études in vitro ne prennent pas en compte la biodisponibilité, le métabolisme et les effets systémiques in vivo", text_en:"No, in vitro studies do not take into account bioavailability, metabolism and systemic in vivo effects"},
    {letter:"C", text_fr:"Oui, les cellules humaines réagissent pareil in vitro et in vivo", text_en:"Yes, human cells react the same in vitro and in vivo"},
    {letter:"D", text_fr:"Non, les études in vitro sont inutiles", text_en:"No, in vitro studies are useless"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. C'est l'une des limites les plus importantes de la recherche en phytothérapie. Une plante peut avoir un effet anti-inflammatoire spectaculaire sur des cellules en culture (in vitro) mais être totalement inactive in vivo car ses molécules actives sont détruites par la digestion, peu absorbées, ou rapidement métabolisées avant d'atteindre leur cible. La biodisponibilité est cruciale.",
  feedback_ok_en: "Exactly. This is one of the most important limitations of herbal medicine research. A plant can have a spectacular anti-inflammatory effect on cells in culture (in vitro) but be totally inactive in vivo because its active molecules are destroyed by digestion, poorly absorbed, or rapidly metabolised before reaching their target. Bioavailability is crucial.",
  feedback_ko_fr: "Beaucoup de sites de vente de compléments citent des études in vitro pour justifier leurs allégations. Apprendre à distinguer les niveaux de preuves (in vitro, animal, essai clinique) est une compétence clé en lecture scientifique.",
  feedback_ko_en: "Many supplement sales websites cite in vitro studies to justify their claims. Learning to distinguish levels of evidence (in vitro, animal, clinical trial) is a key skill in scientific reading.",
  reformulation_fr: "Un effet prouvé en laboratoire sur des cellules garantit-il un effet chez l'humain ?",
  reformulation_en: "Does an effect proven in the laboratory on cells guarantee an effect in humans ?",
  reformulation_answer: "Non / No",
  reformulation_explanation_fr: "La biodisponibilité, le métabolisme intestinal et hépatique, et les effets systémiques in vivo peuvent complètement différer des effets observés in vitro sur des cellules isolées.",
  reformulation_explanation_en: "Bioavailability, intestinal and hepatic metabolism, and systemic in vivo effects can completely differ from effects observed in vitro on isolated cells."
},
{
  question_fr: "La réglementation européenne des compléments alimentaires à base de plantes garantit-elle leur efficacité ?",
  question_en: "Does European regulation of plant-based food supplements guarantee their effectiveness ?",
  options: [
    {letter:"A", text_fr:"Oui, un produit autorisé est forcément efficace", text_en:"Yes, an authorised product is necessarily effective"},
    {letter:"B", text_fr:"Non, la réglementation garantit la sécurité et la qualité mais pas l'efficacité. Seuls les médicaments à base de plantes doivent prouver leur efficacité", text_en:"No, regulation guarantees safety and quality but not effectiveness. Only plant-based medicines must prove their effectiveness"},
    {letter:"C", text_fr:"Oui, l'ANSM vérifie l'efficacité de chaque produit", text_en:"Yes, the ANSM verifies the effectiveness of each product"},
    {letter:"D", text_fr:"Non, il n'y a aucune réglementation en Europe", text_en:"No, there is no regulation in Europe"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. En Europe, les compléments alimentaires (directive 2002/46/CE) sont soumis à des règles de sécurité et d'étiquetage mais n'ont pas à prouver leur efficacité avant commercialisation. Seuls les médicaments à base de plantes (directive 2004/24/CE) doivent démontrer leur efficacité, soit par des essais cliniques, soit par un usage traditionnel bien établi d'au moins 30 ans.",
  feedback_ok_en: "Exactly. In Europe, food supplements (directive 2002/46/CE) are subject to safety and labelling rules but do not have to prove their effectiveness before marketing. Only plant-based medicines (directive 2004/24/CE) must demonstrate their effectiveness, either through clinical trials or through well-established traditional use of at least 30 years.",
  feedback_ko_fr: "La distinction entre complément alimentaire et médicament à base de plantes est fondamentale pour le consommateur. Un médicament à base de plantes a prouvé son efficacité. Un complément alimentaire a seulement prouvé son innocuité.",
  feedback_ko_en: "The distinction between food supplement and plant-based medicine is fundamental for the consumer. A plant-based medicine has proven its effectiveness. A food supplement has only proven its harmlessness.",
  reformulation_fr: "Un complément alimentaire à base de plantes doit-il prouver son efficacité avant d'être vendu en Europe ?",
  reformulation_en: "Must a plant-based food supplement prove its effectiveness before being sold in Europe ?",
  reformulation_answer: "Non / No",
  reformulation_explanation_fr: "Les compléments alimentaires doivent prouver leur sécurité mais pas leur efficacité. Seuls les médicaments à base de plantes ont une obligation de preuve d'efficacité en Europe.",
  reformulation_explanation_en: "Food supplements must prove their safety but not their effectiveness. Only plant-based medicines have an obligation to prove effectiveness in Europe."
},
{
  question_fr: "PIÈGE : Les plantes adaptogènes comme l'ashwagandha sont-elles universellement bénéfiques et sans risque ?",
  question_en: "TRAP : Are adaptogenic plants like ashwagandha universally beneficial and risk-free ?",
  options: [
    {letter:"A", text_fr:"Oui, les adaptogènes sont sans danger pour tout le monde", text_en:"Yes, adaptogens are safe for everyone"},
    {letter:"B", text_fr:"Non, l'ashwagandha peut aggraver les maladies auto-immunes, interagir avec les thyroïdiens et les sédatifs, et des cas d'hépatotoxicité ont été rapportés", text_en:"No, ashwagandha can worsen autoimmune diseases, interact with thyroid medications and sedatives, and cases of hepatotoxicity have been reported"},
    {letter:"C", text_fr:"Oui, elles sont recommandées pour tous les sportifs", text_en:"Yes, they are recommended for all athletes"},
    {letter:"D", text_fr:"Non, elles sont totalement inefficaces", text_en:"No, they are totally ineffective"}
  ],
  correct: "B",
  feedback_ok_fr: "Exactement. L'ashwagandha (Withania somnifera) a des effets adaptogènes et anti-stress documentés via les withanolides. Mais elle stimule le système immunitaire, contre-indiquant son usage dans les maladies auto-immunes. Elle peut augmenter les hormones thyroïdiennes, nécessitant une surveillance en cas de traitement thyroïdien. Des cas d'hépatotoxicité grave ont été rapportés à l'ANSM et l'EMA en 2023-2024.",
  feedback_ok_en: "Exactly. Ashwagandha (Withania somnifera) has documented adaptogenic and anti-stress effects via withanolides. But it stimulates the immune system, contraindicating its use in autoimmune diseases. It can increase thyroid hormones, requiring monitoring with thyroid treatment. Cases of serious hepatotoxicity have been reported to the ANSM and EMA in 2023-2024.",
  feedback_ko_fr: "L'ashwagandha est devenue la plante adaptogène la plus vendue en Europe. Son profil de sécurité était considéré comme excellent jusqu'aux alertes hépatiques de 2023-2024. Cela illustre l'importance de la pharmacovigilance même pour les plantes.",
  feedback_ko_en: "Ashwagandha has become the best-selling adaptogenic plant in Europe. Its safety profile was considered excellent until the hepatic alerts of 2023-2024. This illustrates the importance of pharmacovigilance even for plants.",
  reformulation_fr: "L'ashwagandha est-elle contre-indiquée dans les maladies auto-immunes ?",
  reformulation_en: "Is ashwagandha contraindicated in autoimmune diseases ?",
  reformulation_answer: "Oui / Yes",
  reformulation_explanation_fr: "L'ashwagandha stimule le système immunitaire via ses withanolides. Dans les maladies auto-immunes où ce système est déjà hyperactif, cette stimulation peut aggraver la maladie.",
  reformulation_explanation_en: "Ashwagandha stimulates the immune system via its withanolides. In autoimmune diseases where this system is already hyperactive, this stimulation can worsen the disease."
}
];

var currentIndex = 0, score = 0, selectedLetter = null, validated = false, reformulationAnswered = false, questionsLeft = 3;

renderQuestion();

function renderQuestion() {
  var q = questions[currentIndex];
  selectedLetter = null; validated = false; reformulationAnswered = false;
  document.getElementById('question-text').textContent = q['question_' + lang];
  var list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-letter', opt.letter);
    btn.onclick = function() { selectOption(opt.letter); };
    btn.innerHTML = '<span class="option-letter">' + opt.letter + '</span><span class="option-text">' + opt['text_' + lang] + '</span><span class="option-check">✓</span>';
    list.appendChild(btn);
  });
  var vb = document.getElementById('validate-btn');
  vb.disabled = true; vb.style.display = 'block';
  vb.textContent = lang === 'fr' ? 'Valider' : 'Validate';
  document.getElementById('feedback-block').style.display = 'none';
  document.getElementById('reformulation-block').style.display = 'none';
  document.getElementById('reformulation-title').textContent = '';
  document.getElementById('reformulation-options').innerHTML = '';
  document.getElementById('ask-row').style.display = 'none';
  document.getElementById('ask-input-row').style.display = 'none';
  document.getElementById('ask-reply').textContent = ''; document.getElementById('ask-reply').style.display = 'none';
  document.getElementById('continuer-btn').style.display = 'none';
  document.getElementById('pubmed-block').style.display = 'none';
  updateHeader();
}

function selectOption(letter) {
  if (validated) return;
  selectedLetter = letter;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    btn.classList.remove('selected');
    if (btn.getAttribute('data-letter') === letter) btn.classList.add('selected');
  });
  document.getElementById('validate-btn').disabled = false;
}

function validate() {
  if (!selectedLetter || validated) return;
  validated = true;
  var q = questions[currentIndex];
  var isCorrect = selectedLetter === q.correct;
  document.querySelectorAll('.option-btn').forEach(function(btn) {
    var letter = btn.getAttribute('data-letter');
    btn.onclick = null;
    if (letter === q.correct) { btn.classList.remove('selected'); btn.classList.add('correct'); }
    else if (letter === selectedLetter && !isCorrect) { btn.classList.remove('selected'); btn.classList.add('wrong'); }
  });
  document.getElementById('validate-btn').style.display = 'none';
  var fb = document.getElementById('feedback-block');
  fb.style.display = 'block';
  if (isCorrect) {
    score++;
    fb.style.background = '#e8f4f0';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#2a7fa8">✓</span> <span style="color:#2a7fa8">' + (lang === 'fr' ? 'Bonne réponse !' : 'Correct!') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ok_' + lang];
    showPostFeedback();
  } else {
    fb.style.background = '#fdecea';
    document.getElementById('feedback-top').innerHTML = '<span style="color:#e74c3c">✗</span> <span style="color:#e74c3c">' + (lang === 'fr' ? 'Pas tout à fait...' : 'Not quite...') + '</span>';
    document.getElementById('feedback-text').textContent = q['feedback_ko_' + lang];
    showReformulation();
  }
  updateHeader();
}

function showReformulation() {
  var q = questions[currentIndex];
  document.getElementById('reformulation-block').style.display = 'block';
  document.getElementById('reformulation-title').innerHTML = '🔄 ' + (lang === 'fr' ? 'Essayons autrement...' : 'Let\'s try another way...');
  document.getElementById('reformulation-text').textContent = q['reformulation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'none';
  var opts = document.getElementById('reformulation-options');
  opts.innerHTML = '';
  var refoCorrectIsOui = q.reformulation_answer.toLowerCase().indexOf('oui') === 0;
  var choices = [
    { text_fr: 'Oui', text_en: 'Yes', correct: refoCorrectIsOui },
    { text_fr: 'Non', text_en: 'No', correct: !refoCorrectIsOui }
  ];
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'refo-btn';
    btn.textContent = c['text_' + lang];
    btn.setAttribute('data-correct', c.correct ? '1' : '0');
    btn.onclick = function() { answerReformulation(c.correct, btn, opts.querySelectorAll('.refo-btn')); };
    opts.appendChild(btn);
  });
}

function answerReformulation(isCorrect, clickedBtn, allBtns) {
  if (reformulationAnswered) { if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); } return; }
  if (!isCorrect) { clickedBtn.classList.add('refo-wrong'); setTimeout(function() { clickedBtn.classList.remove('refo-wrong'); }, 600); return; }
  reformulationAnswered = true;
  allBtns.forEach(function(btn) {
    btn.onclick = null;
    if (btn.getAttribute('data-correct') === '1') { btn.classList.add('refo-correct'); btn.innerHTML += ' ✓'; }
  });
  var q = questions[currentIndex];
  document.getElementById('reformulation-explanation').textContent = q['reformulation_explanation_' + lang];
  document.getElementById('reformulation-explanation').style.display = 'block';
  setTimeout(function() { showPostFeedback(); }, 1000);
}

function showPostFeedback() {
  document.getElementById('ask-row').style.display = 'block';
  if (questionsLeft > 0) { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  else { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  if (currentIndex === questions.length - 1) document.getElementById('pubmed-block').style.display = 'block';
  document.getElementById('continuer-btn').style.display = 'block';
  document.getElementById('continuer-btn').textContent = lang === 'fr' ? 'Continuer' : 'Continue';
}

function continuer() {
  if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  else { sessionStorage.setItem('bf_score_pl3', score); window.location.href = 'plantes-niveau3-fin.html'; }
}

function updateHeader() {
  document.getElementById('score-text').textContent = (lang === 'fr' ? 'Score : ' : 'Score: ') + score + '/6';
  document.getElementById('q-counter').textContent = (currentIndex + 1) + '/6';
  document.getElementById('progress-fill').style.width = (((currentIndex) / questions.length * 100) + (100 / questions.length)) + '%';
}

function updateAskBtn() {
  document.getElementById('ask-btn-text').textContent = lang === 'fr'
    ? '💬 Poser une question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's restantes' : ' restante') + ')'
    : '💬 Ask a question (' + questionsLeft + ' question' + (questionsLeft > 1 ? 's' : '') + ' remaining)';
}

function toggleAsk() {
  var row = document.getElementById('ask-input-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

async function sendAsk() {
  if (questionsLeft <= 0) return;
  var input = document.getElementById('ask-input');
  var reply = document.getElementById('ask-reply');
  var question = input.value.trim();
  if (!question) return;
  questionsLeft--;
  input.value = '';
  document.getElementById('ask-input-row').style.display = 'none';
  if (questionsLeft === 0) { document.getElementById('ask-btn').disabled = true; document.getElementById('ask-btn-text').textContent = lang === 'fr' ? '💬 Plus de questions disponibles' : '💬 No more questions available'; }
  else { document.getElementById('ask-btn').disabled = false; updateAskBtn(); }
  reply.textContent = lang === 'fr' ? 'Recherche en cours...' : 'Searching...';
  reply.style.display = 'block';
  try {
    var response = await fetch('https://brainfest-ai.c-piault.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        topic: lang === 'fr' ? 'les plantes médicinales et leurs effets sur la peau' : 'medicinal plants and their effects on the skin',
        language: lang
      })
    });
    var data = await response.json();
    reply.textContent = data.answer || (lang === 'fr' ? 'Désolé, je ne peux pas répondre.' : 'Sorry, I cannot answer.');
  } catch (error) {
    reply.textContent = lang === 'fr' ? 'Erreur de connexion. Réessayez.' : 'Connection error. Please try again.';
  }
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  document.getElementById('lang-toggle').textContent = lang === 'fr' ? 'FR' : 'EN';
  renderQuestion(); updateHeader();
}
</script>
</body>
</html>
